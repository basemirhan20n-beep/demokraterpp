<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#0d1117"/>
<title>DP · ERP Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--card:#1c2128;
  --border:#30363d;--text:#e6edf3;--muted:#7d8590;--dim:#8b949e;
  --green:#3fb950;--red:#f85149;--gold:#e3b341;--blue:#58a6ff;--purple:#bc8cff;
  --sb-w:240px;--header-h:56px;
}
html,body{height:100%;height:100dvh;overflow:hidden;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Oswald', sans-serif;-webkit-font-smoothing:antialiased;font-size:14px;font-weight:500;}

/* ══ LAYOUT ══ */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.app-body{display:flex;flex:1;overflow:hidden;min-height:0;height:calc(100dvh - var(--header-h))}

/* ══ HEADER ══ */
.topbar{height:var(--header-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 max(16px,env(safe-area-inset-left));gap:12px;flex-shrink:0;position:relative;z-index:60;padding-top:env(safe-area-inset-top)}
.tb-logo{font-family:'Oswald', sans-serif;font-size:13px;font-weight:800;color:var(--text);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
@media(min-width:480px){.tb-logo{font-size:15px;max-width:none}}
.tb-logo span{color:var(--green)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.notif-btn{position:relative;background:none;border:1px solid var(--border);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:16px;transition:.15s;border-radius:6px}
.notif-btn:hover{border-color:var(--green);color:var(--green)}
.notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid var(--card)}
.user-menu{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);padding:5px 10px 5px 6px;cursor:pointer;border-radius:6px;transition:.15s}
.user-menu:hover{border-color:var(--green)}
.user-menu-name{font-size:12px;font-weight:700;color:var(--text)}
.user-menu-role{font-size:10px;color:var(--muted);font-weight:500}
.hamburger{background:none;border:1px solid var(--border);width:34px;height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border-radius:6px;flex-shrink:0}
.hamburger span{display:block;width:16px;height:2px;background:var(--dim);border-radius:2px;transition:.2s}
@media(min-width:900px){.hamburger{display:none}}

/* ══ SIDEBAR ══ */
.sidebar{width:var(--sb-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .25s;z-index:55}
@media(max-width:899px){
  .sidebar{position:fixed;top:var(--header-h);left:0;bottom:0;bottom:env(safe-area-inset-bottom);transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,.5);-webkit-overflow-scrolling:touch}
  .sidebar.open{transform:none}
}
.sb-section{padding:8px 10px 4px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-radius:6px;margin:1px 8px;transition:.15s;position:relative;color:var(--dim);font-weight:600;font-size:13px}
.sb-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.sb-item.active{background:rgba(63,185,80,.12);color:var(--green)}
.sb-item.active .sb-icon{color:var(--green)}
.sb-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700}
.sb-divider{border:none;border-top:1px solid var(--border);margin:6px 16px}
.sb-scroll{flex:1;overflow-y:auto;padding-bottom:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.sb-scroll::-webkit-scrollbar{width:4px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-bottom{padding:12px;border-top:1px solid var(--border)}
.online-pill{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--muted)}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse2 2s infinite;flex-shrink:0}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.4}}

/* ══ MAIN ══ */
.main-content{flex:1;min-height:0;min-width:0;overflow-y:auto!important;overflow-x:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-y;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.main-content::-webkit-scrollbar{width:5px}
.main-content::-webkit-scrollbar-thumb{background:var(--border)}
.page{padding:20px 22px;max-width:1300px;padding-bottom:max(80px,calc(env(safe-area-inset-bottom) + 60px));min-height:min-content}
@media(max-width:640px){.page{padding:12px;padding-bottom:max(80px,calc(env(safe-area-inset-bottom) + 60px))}}

/* ══ OVERLAY (mobile sidebar close) ══ */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:54}
.sb-overlay.show{display:block}

/* ══ KPI ══ */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
@media(min-width:480px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:640px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--card);border:1px solid var(--border);padding:14px 16px;border-left:3px solid transparent;border-radius:2px}
.kpi.g{border-left-color:var(--green)}.kpi.r{border-left-color:var(--red)}.kpi.gold{border-left-color:var(--gold)}.kpi.b{border-left-color:var(--blue)}.kpi.p{border-left-color:var(--purple)}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-family:'Oswald', sans-serif;font-size:15px;font-weight:800}
@media(min-width:380px){.kpi-val{font-size:17px}}
@media(min-width:640px){.kpi-val{font-size:21px}}
.kpi-val.g{color:var(--green)}.kpi-val.r{color:var(--red)}.kpi-val.gold{color:var(--gold)}.kpi-val.b{color:var(--blue)}.kpi-val.p{color:var(--purple)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px;font-weight:600}

/* ══ CARDS ══ */
.card{background:var(--card);border:1px solid var(--border);border-radius:2px}
.card-head{padding:12px 16px;border-bottom:1px solid var(--border);font-family:'Oswald', sans-serif;font-size:11px;font-weight:800;letter-spacing:1px;color:var(--green);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:0}

/* ══ TABLE ══ */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:380px}
th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:9px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;font-family:'Oswald', sans-serif}
td{padding:10px 14px;font-size:13px;color:var(--dim);border-bottom:1px solid rgba(48,54,61,.6);font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
td.nm{color:var(--text);font-weight:700}
td.pos{color:var(--green);font-weight:700;font-family:'Oswald', sans-serif}
td.neg{color:var(--red);font-weight:700;font-family:'Oswald', sans-serif}
td.gold{color:var(--gold);font-weight:700;font-family:'Oswald', sans-serif}

/* ══ BADGES ══ */
.badge{display:inline-flex;align-items:center;padding:2px 8px;font-size:10px;letter-spacing:.5px;font-weight:700;border-radius:2px}
.b-green{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.b-red{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.3)}
.b-gold{background:rgba(227,179,65,.12);color:var(--gold);border:1px solid rgba(227,179,65,.3)}
.b-blue{background:rgba(88,166,255,.12);color:var(--blue);border:1px solid rgba(88,166,255,.3)}
.b-purple{background:rgba(188,140,255,.12);color:var(--purple);border:1px solid rgba(188,140,255,.3)}
.b-gray{background:rgba(139,148,158,.12);color:var(--muted);border:1px solid rgba(139,148,158,.25)}

/* ══ MEMBER CARDS ══ */
.mem-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:480px){.mem-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
@media(min-width:768px){.mem-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
.mem-card{background:var(--card);border:1px solid var(--border);padding:14px;cursor:pointer;transition:.15s;position:relative}
.mem-card:hover{border-color:var(--green);background:rgba(63,185,80,.04)}
.mem-ini{width:38px;height:38px;border-radius:50%;background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.25);display:flex;align-items:center;justify-content:center;font-family:'Oswald', sans-serif;font-size:13px;font-weight:800;color:var(--blue);margin-bottom:10px;overflow:hidden;flex-shrink:0}
.mem-ini img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.mem-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.mem-role{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.mem-salary{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--green);font-weight:700;font-family:'Oswald', sans-serif}
.mem-timer{font-size:10px;margin-top:4px;font-weight:700}
.mem-timer.ok{color:var(--green)}.mem-timer.warn{color:var(--gold)}.mem-timer.late{color:var(--red)}.mem-timer.none{color:var(--muted)}
.mem-top-right{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.mem-check{position:absolute;top:10px;left:10px;width:16px;height:16px;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;transition:.15s;border-radius:3px}
.mem-check.on{border-color:var(--green);background:var(--green);color:#fff}

/* ══ ACTIVITY SCORE ══ */
.score-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:4px}
.score-fill{height:100%;border-radius:2px;transition:width .4s}

/* ══ FORM ══ */
.form-box{background:var(--card);border:1px solid var(--border);padding:18px;margin-bottom:14px}
.form-title{font-family:'Oswald', sans-serif;font-size:11px;font-weight:800;letter-spacing:1px;color:var(--green);text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
@media(min-width:500px){.fg{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.field input,.field select,.field textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 11px;font:600 16px 'Oswald', sans-serif;outline:none;-webkit-appearance:none;width:100%;border-radius:0;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);background:var(--card)}
.field select option{background:var(--surface2)}
.field textarea{resize:vertical;min-height:70px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:9px 18px;font:700 11px 'Oswald', sans-serif;letter-spacing:.5px;cursor:pointer;border:none;transition:.15s;border-radius:2px}
.btn-green{background:#238636;color:#fff}.btn-green:hover{background:#2ea043}
.btn-blue{background:rgba(88,166,255,.15);color:var(--blue);border:1px solid rgba(88,166,255,.35)}.btn-blue:hover{background:rgba(88,166,255,.25)}
.btn-red{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.3)}.btn-red:hover{background:rgba(248,81,73,.2)}
.btn-gold{background:rgba(227,179,65,.12);color:var(--gold);border:1px solid rgba(227,179,65,.3)}.btn-gold:hover{background:rgba(227,179,65,.22)}
.btn-gray{background:rgba(139,148,158,.1);color:var(--muted);border:1px solid rgba(139,148,158,.25)}

/* ══ MODAL ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;overscroll-behavior:contain}
@media(min-width:640px){.overlay{align-items:center;padding:20px}}
.modal{background:var(--card);border:1px solid var(--border);width:100%;max-width:560px;max-height:93vh;max-height:93dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;border-radius:0;overscroll-behavior:contain}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1}
.modal-head h2{font-family:'Oswald', sans-serif;font-size:14px;font-weight:800;color:var(--text)}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 6px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:18px}

/* ══ SECTION HEADER ══ */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sh-title{font-family:'Oswald', sans-serif;font-size:11px;font-weight:800;letter-spacing:1px;color:var(--dim);text-transform:uppercase}

/* ══ LIMIT BAR ══ */
.lmt-bar{display:flex;flex-direction:column;gap:5px}
.lmt-bar-row{display:flex;justify-content:space-between;font-size:10px;font-weight:700}
.lmt-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.lmt-fill{height:100%;border-radius:3px;transition:width .4s}

/* ══ PAY ROW ══ */
.pay-list{display:flex;flex-direction:column;gap:5px}
.pay-row{background:var(--card);border:1px solid var(--border);padding:10px 13px;display:flex;align-items:center;gap:10px;transition:.15s}
.pay-row.late{border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.04)}
.pay-info{flex:1;min-width:0;cursor:pointer}
.pay-name{font-size:13px;font-weight:700;color:var(--text)}
.pay-sub{font-size:10px;color:var(--muted);font-weight:600;margin-top:1px}
.pay-timer{font-size:11px;font-weight:700;min-width:80px;text-align:right;font-family:'Oswald', sans-serif}
.pay-timer.ok{color:var(--green)}.pay-timer.warn{color:var(--gold)}.pay-timer.late{color:var(--red)}.pay-timer.none{color:var(--muted)}
.pay-btn{padding:6px 12px;font:700 9px 'Oswald', sans-serif;letter-spacing:.5px;cursor:pointer;border:1px solid rgba(63,185,80,.3);background:rgba(63,185,80,.1);color:var(--green);transition:.15s;flex-shrink:0}
.pay-btn:hover{background:rgba(63,185,80,.2)}

/* ══ CHAT ══ */
.chat-wrap{display:flex;height:calc(100vh - var(--header-h) - 0px);height:calc(100dvh - var(--header-h));background:var(--card);border:1px solid var(--border)}
.chat-sidebar{width:230px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column}
@media(max-width:640px){.chat-sidebar{width:200px}}
.chat-sb-head{padding:11px 14px;border-bottom:1px solid var(--border);font-family:'Oswald', sans-serif;font-size:10px;font-weight:800;color:var(--green);letter-spacing:1px}
.chat-room{padding:10px 12px;cursor:pointer;border-bottom:1px solid rgba(48,54,61,.5);display:flex;align-items:center;gap:8px;transition:.15s}
.chat-room:hover{background:rgba(255,255,255,.04)}
.chat-room.active{background:rgba(63,185,80,.08);border-left:2px solid var(--green)}
.chat-room-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-room-sub{font-size:10px;color:var(--muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.chat-unread{margin-left:auto;background:var(--red);color:#fff;font-size:8px;padding:1px 5px;border-radius:10px;font-weight:900;flex-shrink:0}
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-main-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.chat-msg{display:flex;align-items:flex-end;gap:7px}
.chat-msg.me{flex-direction:row-reverse}
.chat-bubble{max-width:72%;padding:8px 12px;font-size:13px;font-weight:500;line-height:1.6;position:relative}
.chat-msg.them .chat-bubble{background:var(--surface2);border:1px solid var(--border)}
.chat-msg.me .chat-bubble{background:rgba(35,134,54,.2);border:1px solid rgba(35,134,54,.35)}
.chat-meta{font-size:9px;color:var(--muted);font-weight:600;margin-top:3px}
.chat-msg.me .chat-meta{text-align:right}
.typing-bar{padding:4px 14px 6px;font-size:11px;color:var(--green);font-weight:600;font-style:italic;min-height:20px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.tdots{display:flex;gap:3px}
.tdots span{width:4px;height:4px;border-radius:50%;background:var(--green);animation:tdot 1.2s infinite}
.tdots span:nth-child(2){animation-delay:.2s}.tdots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.chat-input-wrap{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.chat-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;font:500 16px 'Oswald', sans-serif;outline:none;resize:none;height:38px;max-height:100px;overflow-y:auto;transition:.15s}
.chat-input:focus{border-color:var(--green)}
.chat-send{padding:8px 16px;background:#238636;color:#fff;border:none;cursor:pointer;font:700 11px 'Oswald', sans-serif;letter-spacing:.5px;transition:.15s;flex-shrink:0}
.chat-send:hover{background:#2ea043}

/* ══ CALENDAR ══ */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-header{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:6px 0;letter-spacing:.5px}
.cal-day{min-height:70px;background:var(--card);border:1px solid var(--border);padding:6px;cursor:pointer;transition:.15s;position:relative}
.cal-day:hover{border-color:var(--green)}
.cal-day.today{border-color:var(--green);background:rgba(63,185,80,.05)}
.cal-day.other-month{opacity:.35}
.cal-day-num{font-size:12px;font-weight:700;color:var(--dim);margin-bottom:3px}
.cal-day.today .cal-day-num{color:var(--green)}
.cal-event{font-size:9px;padding:1px 5px;margin-bottom:2px;font-weight:700;border-radius:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-event.toplanti{background:rgba(88,166,255,.2);color:var(--blue)}
.cal-event.etkinlik{background:rgba(63,185,80,.2);color:var(--green)}
.cal-event.dogum{background:rgba(227,179,65,.2);color:var(--gold)}
.cal-event.hatirlatici{background:rgba(188,140,255,.2);color:var(--purple)}
@media(max-width:640px){.cal-day{min-height:44px;padding:4px;}.cal-event{display:none}.cal-day-header{font-size:9px;padding:4px 0}}

/* ══ NOTIFICATION ══ */
.notif-dropdown{position:fixed;top:calc(var(--header-h) + 4px);right:8px;width:min(320px,calc(100vw - 16px));background:var(--card);border:1px solid var(--border);z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.5);max-height:400px;overflow-y:auto}
.notif-head{padding:10px 14px;border-bottom:1px solid var(--border);font-family:'Oswald', sans-serif;font-size:10px;font-weight:800;color:var(--green);letter-spacing:1px}
.notif-item{padding:10px 14px;border-bottom:1px solid rgba(48,54,61,.5);display:flex;gap:9px;cursor:pointer;transition:.15s}
.notif-item:hover{background:rgba(255,255,255,.03)}
.notif-item.unread{background:rgba(88,166,255,.05)}
.notif-txt{flex:1;min-width:0}
.notif-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.notif-sub{font-size:10px;color:var(--muted);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notif-time{font-size:9px;color:var(--muted);white-space:nowrap}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));right:16px;left:16px;background:var(--card);border:1px solid var(--border);border-left:4px solid var(--green);padding:11px 15px;font-size:13px;font-weight:600;color:var(--text);z-index:500;animation:tsin .25s ease;box-shadow:0 4px 20px rgba(0,0,0,.5)}
@media(min-width:500px){.toast{left:auto;max-width:340px}}
.toast.err{border-left-color:var(--red)}.toast.warn{border-left-color:var(--gold)}
@keyframes tsin{from{transform:translateY(100%);opacity:0}to{transform:none;opacity:1}}

/* ══ AVATAR ══ */
.av-wrap{position:relative;cursor:pointer;flex-shrink:0}
.av{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald', sans-serif;font-weight:800;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.av-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;font-size:12px;color:#fff}
.av-wrap:hover .av-overlay{opacity:1}
.av-input{display:none}
.online-dot2{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;border:2px solid var(--card)}

/* ══ INFO ROW ══ */
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(48,54,61,.6);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--muted);font-weight:600}
.info-val{color:var(--text);font-weight:700}

/* ══ RAPOR ══ */
.report-section{background:var(--surface2);border:1px solid var(--border);padding:16px;margin-bottom:14px}
.report-title{font-family:'Oswald', sans-serif;font-size:12px;font-weight:800;color:var(--green);margin-bottom:12px;letter-spacing:.5px}

/* ══ KARNET ══ */
.karnet-ring{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.ring-outer{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.ring-score{font-family:'Oswald', sans-serif;font-size:20px;font-weight:800}

/* ══ LOGIN ══ */
.login-wrap{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.login-card{background:var(--card);border:1px solid var(--border);width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.login-top{padding:28px 24px 20px;text-align:center;border-bottom:1px solid var(--border)}
.login-emblem{width:52px;height:52px;border:1px solid rgba(63,185,80,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(63,185,80,.1);margin:0 auto 12px}
.login-title{font-family:'Oswald', sans-serif;font-size:18px;font-weight:800;color:var(--text);letter-spacing:1px}
.login-sub{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;letter-spacing:1px}
.login-tabs{display:flex;border-bottom:1px solid var(--border)}
.login-tab{flex:1;padding:11px;background:none;border:none;border-bottom:2px solid transparent;font:700 10px 'Oswald', sans-serif;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;color:var(--muted);transition:.15s}
.login-tab.active{color:var(--green);border-bottom-color:var(--green)}
.login-body{padding:22px 24px}
.lf{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.lf label{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);font-weight:700}
.lf input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;font:600 16px 'Oswald', sans-serif;outline:none;width:100%;transition:.15s}
.lf input:focus{border-color:var(--green)}
.login-btn{width:100%;padding:11px;font:700 12px 'Oswald', sans-serif;letter-spacing:.5px;cursor:pointer;background:#238636;border:none;color:#fff;transition:.15s}
.login-btn:hover{background:#2ea043}
.login-err{font-size:11px;color:var(--red);margin-top:10px;text-align:center;font-weight:700}

/* ══ UPLOAD ZONE ══ */
.upload-zone{border:2px dashed var(--border);padding:30px 20px;text-align:center;cursor:pointer;transition:.15s;background:var(--card);margin-bottom:16px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--green);background:rgba(63,185,80,.04)}
.upload-zone input{display:none}

/* ══ CHART ══ */
.chart-card{background:var(--card);border:1px solid var(--border);padding:16px;margin-bottom:12px}
.chart-title{font-family:'Oswald', sans-serif;font-size:10px;font-weight:800;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
.chart-wrap{position:relative;height:200px}
.chart-grid-2{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:700px){.chart-grid-2{grid-template-columns:1fr 1fr}}
.alert-box{background:rgba(248,81,73,.06);border:1px solid rgba(248,81,73,.25);padding:11px 14px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}
.alert-txt{font-size:12px;color:var(--red);font-weight:700;line-height:1.5}

/* ══ AC INPUT ══ */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border);z-index:50;max-height:200px;overflow-y:auto}
.ac-item{padding:9px 12px;font-size:13px;color:var(--text);cursor:pointer;display:flex;justify-content:space-between;font-weight:600;transition:.1s}
.ac-item:hover,.ac-item.sel{background:rgba(63,185,80,.08)}
.ac-item span:last-child{font-size:10px;color:var(--muted)}

/* ══ EMPTY ══ */
.empty{padding:32px;text-align:center;color:var(--muted);font-size:14px;font-style:italic;font-weight:500}

/* ══ SUB TABS ══ */
.sub-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto;scrollbar-width:none}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{padding:9px 16px;background:none;border:none;border-bottom:2px solid transparent;font:700 11px 'Oswald', sans-serif;cursor:pointer;color:var(--muted);white-space:nowrap;transition:.15s}
.sub-tab:hover{color:var(--text)}
.sub-tab.active{color:var(--green);border-bottom-color:var(--green)}

/* ══ LOG ITEM ══ */
.log-item{padding:9px 14px;border-bottom:1px solid rgba(48,54,61,.5);display:flex;gap:10px;align-items:center;font-size:12px;font-weight:600}
.log-item:last-child{border-bottom:none}
.log-icon{font-size:14px;flex-shrink:0}
.log-text{flex:1;color:var(--text)}.log-time{font-size:10px;color:var(--muted);white-space:nowrap;font-family:'Oswald', sans-serif}

/* ══ TICKET CHAT ══ */
.ticket-bubble{padding:9px 13px;max-width:85%;line-height:1.6;font-size:13px;font-weight:500;margin-bottom:4px}
.ticket-bubble.admin{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.2);align-self:flex-start}
.ticket-bubble.user{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.2);align-self:flex-end}

/* ══ MISC ══ */
.page-title{font-family:'Oswald', sans-serif;font-size:16px;font-weight:800;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
@media(min-width:640px){.page-title{font-size:18px}}
.page-title .pt-icon{font-size:20px}
.sep{border:none;border-top:1px solid var(--border);margin:16px 0}

/* ═══ OYUNLAR ═══ */
.game-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.game-tabs::-webkit-scrollbar{display:none}
.game-tab{padding:10px 16px;background:none;border:none;border-bottom:2px solid transparent;font:700 11px 'Oswald', sans-serif;cursor:pointer;color:var(--muted);white-space:nowrap;transition:.15s}
.game-tab:hover{color:var(--text)}.game-tab.active{color:var(--green);border-bottom-color:var(--green)}
.gold-bar{display:flex;align-items:center;gap:8px;background:rgba(227,179,65,.1);border:1px solid rgba(227,179,65,.3);padding:9px 14px;margin-bottom:16px}
.gold-icon{font-size:20px}.gold-amount{font-family:'Oswald', sans-serif;font-size:18px;font-weight:800;color:var(--gold)}
.gold-label{font-size:10px;color:var(--muted);font-weight:700;margin-top:1px}
/* Hunt */
.hunt-area{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-bottom:14px}
.animal-card{background:var(--card);border:1px solid var(--border);padding:12px 8px;text-align:center;cursor:pointer;transition:.15s;position:relative}
.animal-card:hover{border-color:var(--green);transform:translateY(-2px)}
.animal-card.caught{border-color:var(--gold);background:rgba(227,179,65,.06)}
.animal-emoji{font-size:32px;margin-bottom:6px}
.animal-name{font-size:10px;font-weight:700;color:var(--text);margin-bottom:2px}
.animal-rarity{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px}
.r-common{background:rgba(139,148,158,.15);color:var(--muted)}
.r-uncommon{background:rgba(63,185,80,.12);color:var(--green)}
.r-rare{background:rgba(88,166,255,.12);color:var(--blue)}
.r-epic{background:rgba(188,140,255,.12);color:var(--purple)}
.r-legendary{background:rgba(227,179,65,.15);color:var(--gold)}
.animal-count{position:absolute;top:6px;right:6px;background:var(--green);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px}
.hunt-btn{width:100%;padding:12px;font:800 13px 'Oswald', sans-serif;background:#238636;color:#fff;border:none;cursor:pointer;transition:.15s;margin-bottom:12px;letter-spacing:.5px}
.hunt-btn:hover{background:#2ea043}.hunt-btn:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed}
.battle-area{background:var(--card);border:1px solid var(--border);padding:16px;margin-bottom:12px}
.vs-row{display:flex;align-items:center;justify-content:space-evenly;gap:12px;margin:12px 0}
.fighter{text-align:center;flex:1}
.fighter-emoji{font-size:48px;margin-bottom:6px}
.fighter-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px}
.hp-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:4px}
.hp-fill{height:100%;border-radius:3px;background:var(--green);transition:width .5s}
.vs-badge{font-family:'Oswald', sans-serif;font-size:20px;font-weight:900;color:var(--red)}
.battle-log{background:var(--surface2);border:1px solid var(--border);padding:10px;max-height:140px;overflow-y:auto;font-size:11px;font-family:'Oswald', sans-serif;color:var(--dim);line-height:1.8;margin-bottom:10px}
/* Cards */
.card-table{background:var(--card);border:1px solid var(--border);padding:20px;text-align:center;margin-bottom:12px}
.card-deck{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.playing-card{width:60px;height:88px;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;font-weight:800;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.playing-card.red{color:#f85149}.playing-card.black{color:var(--text)}
.card-val{font-size:11px;position:absolute;top:4px;left:6px;font-weight:800;line-height:1}
.card-bet-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.bet-chip{padding:6px 14px;font:700 11px 'Oswald', sans-serif;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:.15s;border-radius:2px}
.bet-chip:hover{border-color:var(--gold);color:var(--gold)}
.score-display{font-family:'Oswald', sans-serif;font-size:14px;font-weight:800;color:var(--muted);margin-bottom:8px}
/* Wheel */
.wheel-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0;margin-bottom:12px}
.wheel-outer{position:relative;width:260px;height:260px;margin-bottom:16px}
.wheel-canvas{border-radius:50%;box-shadow:0 0 30px rgba(63,185,80,.2)}
.wheel-pointer{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:24px;z-index:2}
.wheel-spin-btn{padding:12px 32px;font:800 13px 'Oswald', sans-serif;background:#238636;color:#fff;border:none;cursor:pointer;transition:.15s;letter-spacing:.5px;border-radius:2px}
.wheel-spin-btn:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed}
/* Trivia */
.trivia-card{background:var(--card);border:1px solid var(--border);padding:20px;margin-bottom:12px}
.trivia-q{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;line-height:1.6}
.trivia-opts{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:480px){.trivia-opts{grid-template-columns:1fr 1fr}}
.trivia-opt{padding:10px 14px;background:var(--surface2);border:1px solid var(--border);font:600 12px 'Oswald', sans-serif;cursor:pointer;text-align:left;color:var(--text);transition:.15s;border-radius:2px}
.trivia-opt:hover:not(:disabled){border-color:var(--blue);background:rgba(88,166,255,.08)}
.trivia-opt.correct{border-color:var(--green);background:rgba(63,185,80,.15);color:var(--green)}
.trivia-opt.wrong{border-color:var(--red);background:rgba(248,81,73,.1);color:var(--red)}
.trivia-score{font-family:'Oswald', sans-serif;font-size:14px;font-weight:800;color:var(--blue)}
/* Word */
.word-grid{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.word-letter{width:38px;height:38px;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Oswald', sans-serif;font-size:18px;font-weight:900;color:var(--text);transition:.2s;border-radius:2px}
.word-letter.correct{background:rgba(63,185,80,.2);border-color:var(--green);color:var(--green)}
.word-letter.present{background:rgba(227,179,65,.2);border-color:var(--gold);color:var(--gold)}
.word-letter.absent{background:var(--card);border-color:var(--border);color:var(--muted)}
.word-input-row{display:flex;gap:6px;justify-content:center;margin-bottom:10px}
.word-input{width:200px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;font:700 14px 'Oswald', sans-serif;outline:none;text-transform:uppercase;text-align:center;letter-spacing:3px}
.word-input:focus{border-color:var(--green)}
.kbd{display:flex;flex-direction:column;gap:4px;align-items:center;margin-top:10px}
.kbd-row{display:flex;gap:4px}
.kbd-key{width:28px;height:28px;background:var(--surface2);border:1px solid var(--border);font:700 11px 'Oswald', sans-serif;cursor:pointer;color:var(--text);transition:.15s;border-radius:2px;display:flex;align-items:center;justify-content:center}
.kbd-key.g{background:rgba(63,185,80,.25);border-color:var(--green);color:var(--green)}
.kbd-key.y{background:rgba(227,179,65,.2);border-color:var(--gold);color:var(--gold)}
.kbd-key.x{background:var(--card);color:var(--muted)}
.game-result{text-align:center;padding:16px;background:var(--surface2);border:1px solid var(--border);margin-bottom:12px}
.game-result-icon{font-size:40px;margin-bottom:8px}
.game-result-title{font-family:'Oswald', sans-serif;font-size:18px;font-weight:800;margin-bottom:6px}
.game-result-sub{font-size:13px;color:var(--muted);font-weight:600}

/* ═══ SESLİ SOHBET ═══ */
.voice-wrap{display:grid;grid-template-columns:260px 1fr;gap:0;border:1px solid var(--border);background:var(--card);min-height:500px;overflow:hidden}
@media(max-width:700px){.voice-wrap{grid-template-columns:1fr;grid-template-rows:auto 1fr}}
.voice-sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column}
.voice-sb-head{padding:12px 14px;border-bottom:1px solid var(--border);font-family:'Oswald', sans-serif;font-size:11px;font-weight:800;letter-spacing:1px;color:var(--green);text-transform:uppercase}
.voice-channel{padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(48,54,61,.5);transition:.15s;display:flex;align-items:center;justify-content:space-between;gap:8px}
.voice-channel:hover{background:rgba(255,255,255,.04)}
.voice-channel.active{background:rgba(63,185,80,.08);border-left:3px solid var(--green)}
.vc-name{font-size:13px;font-weight:700;color:var(--text)}
.vc-count{font-size:10px;color:var(--muted);font-weight:600}
.voice-main{display:flex;flex-direction:column;overflow:hidden}
.voice-main-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.voice-channel-title{font-family:'Oswald', sans-serif;font-size:15px;font-weight:800;color:var(--text)}
.voice-status-bar{padding:10px 14px;border-top:1px solid var(--border);background:rgba(63,185,80,.05);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.voice-controls{display:flex;gap:8px;align-items:center}
.vc-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.vc-btn:hover{border-color:var(--green);background:rgba(63,185,80,.1)}
.vc-btn.muted{border-color:var(--red);background:rgba(248,81,73,.12);color:var(--red)}
.vc-btn.active{border-color:var(--green);background:rgba(63,185,80,.15);color:var(--green)}
.vc-btn.leave{border-color:var(--red);background:rgba(248,81,73,.15);color:var(--red)}
.vc-btn.join{border-color:var(--green);background:rgba(63,185,80,.2);color:var(--green);width:auto;border-radius:4px;padding:0 16px;font:700 11px 'Oswald', sans-serif;letter-spacing:.5px}
.voice-participants{flex:1;padding:16px;display:flex;flex-wrap:wrap;align-items:flex-start;align-content:flex-start;gap:12px;overflow-y:auto}
.participant{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;min-width:90px;cursor:default;transition:.15s;position:relative}
.participant.speaking{border-color:var(--green);background:rgba(63,185,80,.08);box-shadow:0 0 0 2px rgba(63,185,80,.2)}
.participant.muted-p{opacity:.6}
.participant-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald', sans-serif;font-size:20px;font-weight:900;color:var(--blue);background:rgba(88,166,255,.12);border:2px solid rgba(88,166,255,.25);overflow:hidden;position:relative}
.participant-avatar img{width:100%;height:100%;object-fit:cover}
.speaking-ring{position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--green);animation:speakpulse 1s infinite}
@keyframes speakpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.05)}}
.participant-name{font-size:11px;font-weight:700;color:var(--text);text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.participant-mute-icon{position:absolute;bottom:-4px;right:-4px;width:18px;height:18px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;border:1.5px solid var(--card)}
.voice-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);padding:40px}
.voice-empty-icon{font-size:48px;opacity:.4}
.voice-empty-text{font-size:14px;font-weight:600;font-style:italic}
.voice-quality{font-size:9px;color:var(--green);font-weight:700;display:flex;align-items:center;gap:4px}
.voice-quality::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse2 2s infinite}

/* ═══════════ MOBİL DÜZELTMELER ═══════════ */
/* iOS Safari input zoom fix */
input,select,textarea{font-size:16px!important}
@media(min-width:640px){input,select,textarea{font-size:13px!important}}

/* Safe area for iPhone notch/home bar */
.topbar{padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));}
.app{padding-bottom:env(safe-area-inset-bottom)}

/* Prevent horizontal scroll on mobile */
