function KoopTimer({targetTs,label}){
  const [t,setT]=useState('');
  useEffect(()=>{
    const calc=()=>{
      const now=Date.now();
      const diff=targetTs-now;
      if(diff<=0){setT('⏰ SÜRE DOLDU');return;}
      const h=Math.floor(diff/3600000);
      const m=Math.floor((diff%3600000)/60000);
      const s=Math.floor((diff%60000)/1000);
      setT(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);
    };
    calc();
    const iv=setInterval(calc,1000);
    return()=>clearInterval(iv);
  },[targetTs]);
  return <span style={{fontFamily:"'Oswald',sans-serif",fontWeight:800,color:Date.now()>targetTs?'var(--red)':'var(--green)'}}>{t}</span>;
}

function KooperatifPage({kooperatifler,setKooperatifler,koopGunlukGonderim,setKoopGunlukGonderim,uyeUcretler,setUyeUcretler,members,user,showT,setTxs,bakiye,bugun}){
  const isAdmin=user.tip==='admin';
  const [subTab,setSubTab]=useState('liste');
  const [showYeni,setShowYeni]=useState(false);
  const [yForm,setYF]=useState({fiyat:KOOP_FIYATLAR[0],gun:2,ad:'',aciklama:''});
  const [uyeEkleModal,setUyeEkleModal]=useState(null);
  const [secilenUye,setSecilenUye]=useState('');

  const now=Date.now();

  // Kar hesaplama: fiyat = kişi başı yatırım. Her 2 günde %50 artar.
  // 2gün→%50, 4gün→%100, 6gün→%150 ... kişi başı kar = fiyat × karOrani%
  const hesaplaKar=(fiyat,gun)=>{
    const karOrani=(gun/2)*50; // %
    const kisiBasiKar=Math.floor(fiyat*karOrani/100); // kişi başı net kar
    const toplamKar=kisiBasiKar*4; // 4 kişinin toplam karı
    const kisiBasiKasayaPay=Math.floor(kisiBasiKar*0.20); // kişi başı %20 kasaya
    const toplamKasayaPay=kisiBasiKasayaPay*4; // toplam kasaya giren
    const kisiBasiGunlukKazanc=Math.floor(kisiBasiKar/gun); // günlük kişi başı
    return{karOrani,toplamKar,kisiBasiKar,kisiBasiKasayaPay,toplamKasayaPay,kisiBasiGunlukKazanc};
  };

  const koopOlustur=()=>{
    if(!yForm.ad){showT('Kooperatif adı zorunlu.','err');return;}
    const fiyat=+yForm.fiyat;
    const gun=+yForm.gun;
    const k=hesaplaKar(fiyat,gun);
    const koop={
      id:TXN(),
      ad:yForm.ad,
      aciklama:yForm.aciklama,
      fiyat,gun,
      karOrani:k.karOrani,
      toplamKar:k.toplamKar,
      kisiBasiKar:k.kisiBasiKar,
      kisiBasiKasayaPay:k.kisiBasiKasayaPay,
      toplamKasayaPay:k.toplamKasayaPay,
      kisiBasiGunlukKazanc:k.kisiBasiGunlukKazanc,
      uyeler:[],
      durum:'Bekliyor',
      olusturan:user.ad,
      olusturmaTarih:NOW(),
      olusturmaTsMs:now,
      baslamaTsMs:null,
      bitisTs:null,
      sayacBitis:now+86400000,
    };
    setKooperatifler(p=>[koop,...p]);
    setYF({fiyat:KOOP_FIYATLAR[0],gun:2,ad:'',aciklama:''});
    setShowYeni(false);
    showT('✓ Kooperatif oluşturuldu.');
  };

  const uyeEkle=(koopId,uyeAd)=>{
    if(!uyeAd){showT('Üye seçin.','err');return;}
    setKooperatifler(p=>p.map(k=>{
      if(k.id!==koopId)return k;
      if(k.uyeler.includes(uyeAd)){showT('Bu üye zaten ekli.','warn');return k;}
      if(k.uyeler.length>=4){showT('Kooperatif 4 kişi dolu.','warn');return k;}
      const yeniUyeler=[...k.uyeler,uyeAd];
      let baslamaTsMs=k.baslamaTsMs;
      let durum=k.durum;
      let bitisTs=k.bitisTs;
      if(yeniUyeler.length===4&&!k.baslamaTsMs){
        baslamaTsMs=Date.now();
        durum='Aktif';
        bitisTs=baslamaTsMs+(k.gun*86400000);
      }
      return{...k,uyeler:yeniUyeler,baslamaTsMs,durum,bitisTs};
    }));
    setUyeEkleModal(null);
    setSecilenUye('');
    showT('✓ Üye eklendi.');
  };

  const koopTamamla=(koop)=>{
    if(koop.uyeler.length<4){showT('4 üye dolmadan tamamlanamaz.','err');return;}
    // Eski koopların hesabını geriye dönük düzelt
    const k=hesaplaKar(koop.fiyat,koop.gun);
    const kasayaPay=koop.toplamKasayaPay||k.toplamKasayaPay;
    const kisiPay=koop.kisiBasiKasayaPay||k.kisiBasiKasayaPay;
    setTxs(p=>[{id:TXN(),tip:'GELİR',aciklama:`Kooperatif Tamamlandı: ${koop.ad} — Kişi Başı %20 Kar Payı (${FMT(kisiPay)}×4)`,gonderen:'Kooperatif Sistemi',tutar:kasayaPay,tur:'Kooperatif Geliri',tarih:NOW()},...p]);
    // Her üyenin ücret borcuna kişi başı kasaya payını ekle
    setUyeUcretler(prev=>{
      const sonraki={...prev};
      koop.uyeler.forEach(ad=>{
        sonraki[ad]=(sonraki[ad]||0)+kisiPay;
      });
      return sonraki;
    });
    setKooperatifler(p=>p.map(k=>k.id===koop.id?{...k,durum:'Tamamlandı',tamamlanmaTarih:NOW(),kasayaAktarilan:kasayaPay,kisiBasiKasayaPay:kisiPay}:k));
    showT(`✓ Koop tamamlandı. Kasaya ${FMT(kasayaPay)} aktarıldı.`);
  };

  const koopIptal=(koop)=>{
    setKooperatifler(p=>p.map(k=>k.id===koop.id?{...k,durum:'İptal',iptalTarih:NOW()}:k));
    showT('Kooperatif iptal edildi.');
  };

  const ucretOde=(ad)=>{
    setUyeUcretler(p=>({...p,[ad]:0}));
    showT(`✓ ${ad} ücreti ödendi, borç sıfırlandı.`);
  };

  // Günlük gönderim takibi
  const bugunKoopKey=(koopId)=>`${koopId}_${bugun}`;
  const gonderilenler=(koopId)=>koopGunlukGonderim[bugunKoopKey(koopId)]||{};
  const gonderimIsaretle=(koopId,uyeAd)=>{
    const key=bugunKoopKey(koopId);
    setKoopGunlukGonderim(p=>({...p,[key]:{...p[key],[uyeAd]:true}}));
    showT(`✓ ${uyeAd} gönderimi işaretlendi.`);
  };

  const aktifKooplar=kooperatifler.filter(k=>k.durum==='Aktif'||k.durum==='Bekliyor');
  const gecmisKooplar=kooperatifler.filter(k=>k.durum==='Tamamlandı'||k.durum==='İptal');
  const durumBadge=(d)=>d==='Aktif'?'b-green':d==='Bekliyor'?'b-gold':d==='Tamamlandı'?'b-blue':'b-red';
  const tumUyeAdlari=[...members.map(m=>m.ad)];

  // Ücret listesi — aktif kooplardaki tüm üyeler
  const ucretListesi=()=>{
    const uyeler={};
    kooperatifler.filter(k=>k.durum==='Aktif'||k.durum==='Tamamlandı').forEach(koop=>{
      koop.uyeler.forEach(ad=>{
        if(!uyeler[ad])uyeler[ad]=[];
        uyeler[ad].push(koop);
      });
    });
    return uyeler;
  };

  // Form önizleme
  const onizleme=hesaplaKar(+yForm.fiyat,+yForm.gun);

  return <>
    <div className="page-title"><span className="pt-icon">🏗</span>Kooperatif Sistemi</div>

    {/* KPI */}
    <div className="kpi-grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))'}}>
      <div className="kpi g"><div className="kpi-label">Toplam Koop</div><div className="kpi-val g" style={{fontSize:20}}>{kooperatifler.length}</div></div>
      <div className="kpi b"><div className="kpi-label">Aktif</div><div className="kpi-val b" style={{fontSize:20}}>{kooperatifler.filter(k=>k.durum==='Aktif').length}</div></div>
      <div className="kpi gold"><div className="kpi-label">Bekliyor</div><div className="kpi-val gold" style={{fontSize:20}}>{kooperatifler.filter(k=>k.durum==='Bekliyor').length}</div></div>
      <div className="kpi p"><div className="kpi-label">Tamamlanan</div><div className="kpi-val p" style={{fontSize:20}}>{kooperatifler.filter(k=>k.durum==='Tamamlandı').length}</div></div>
    </div>

    <div className="sub-tabs">
      {[['liste','📋 Aktif Kooplar'],['gecmis','📂 Geçmiş'],['gunluk','📤 Günlük Gönderim'],['ucret','💳 Ücret Listesi']].map(([k,v])=>(
        <button key={k} className={`sub-tab${subTab===k?' active':''}`} onClick={()=>setSubTab(k)}>{v}</button>
      ))}
    </div>

    {/* YENİ KOOP OLUŞTUR */}
    {isAdmin&&!showYeni&&<div style={{marginBottom:14}}>
      <button className="btn btn-green" onClick={()=>setShowYeni(true)}>+ Yeni Kooperatif Oluştur</button>
    </div>}
    {isAdmin&&showYeni&&<div className="form-box" style={{marginBottom:14}}>
      <div className="form-title">Yeni Kooperatif</div>
      <div className="fg">
        <div className="field full"><label>Kooperatif Adı *</label><input value={yForm.ad} onChange={e=>setYF(p=>({...p,ad:e.target.value}))} placeholder="Kooperatif adı"/></div>
        <div className="field">
          <label>Yatırım Fiyatı</label>
          <select value={yForm.fiyat} onChange={e=>setYF(p=>({...p,fiyat:+e.target.value}))}>
            {KOOP_FIYATLAR.map(f=><option key={f} value={f}>{KOOP_FMT(f)} TL</option>)}
          </select>
        </div>
        <div className="field">
          <label>Süre (Gün) — 2 ile 10</label>
          <select value={yForm.gun} onChange={e=>setYF(p=>({...p,gun:+e.target.value}))}>
            {[2,3,4,5,6,7,8,9,10].map(g=><option key={g} value={g}>{g} Gün</option>)}
          </select>
        </div>
        <div className="field full"><label>Açıklama</label><textarea value={yForm.aciklama} onChange={e=>setYF(p=>({...p,aciklama:e.target.value}))} placeholder="İsteğe bağlı..."/></div>
      </div>
      <div style={{background:'rgba(63,185,80,.06)',border:'1px solid rgba(63,185,80,.2)',padding:'10px 14px',marginBottom:12,fontSize:12,color:'var(--text)',lineHeight:2}}>
        <div>💰 <b style={{color:'var(--gold)',fontFamily:"'Oswald',sans-serif"}}>{KOOP_FMT(+yForm.fiyat)} TL</b> yatırım · <b style={{color:'var(--blue)'}}>{yForm.gun} Gün</b> · <b style={{color:'var(--green)'}}>%{onizleme.karOrani} Kar</b></div>
        <div>📊 Toplam Kar: <b style={{color:'var(--green)',fontFamily:"'Oswald',sans-serif"}}>{FMT(onizleme.toplamKar)} TL</b></div>
        <div>👤 Kişi Başı Kar: <b style={{color:'var(--blue)',fontFamily:"'Oswald',sans-serif"}}>{FMT(onizleme.kisiBasiKar)} TL</b></div>
        <div>🏦 Kişi Başı Kasaya (%20): <b style={{color:'var(--purple)',fontFamily:"'Oswald',sans-serif"}}>{FMT(onizleme.kisiBasiKasayaPay)} TL</b> × 4 = <b style={{color:'var(--purple)'}}>{FMT(onizleme.toplamKasayaPay)} TL</b></div>
      </div>
      <div className="btn-row">
        <button className="btn btn-green" onClick={koopOlustur}>Oluştur</button>
        <button className="btn btn-gray" onClick={()=>setShowYeni(false)}>İptal</button>
      </div>
    </div>}

    {/* AKTİF KOOPLAR LİSTESİ */}
    {subTab==='liste'&&<>
      {aktifKooplar.length===0&&<div className="empty">Aktif kooperatif yok. Yeni bir tane oluşturun.</div>}
      {aktifKooplar.map(koop=>{
        const doluluk=koop.uyeler.length;
        const dolmu=doluluk>=4;
        const suremiBitti=koop.bitisTs&&Date.now()>koop.bitisTs;
        const sayacBitti=Date.now()>koop.sayacBitis&&koop.durum==='Bekliyor';
        const k=hesaplaKar(koop.fiyat,koop.gun);
        const kisiPay=koop.kisiBasiKasayaPay||k.kisiBasiKasayaPay;
        const toplamPay=koop.toplamKasayaPay||k.toplamKasayaPay;
        const kisiKar=koop.kisiBasiKar||k.kisiBasiKar;
        const kisiGunluk=koop.kisiBasiGunlukKazanc||k.kisiBasiGunlukKazanc;
        const karOrani=koop.karOrani||k.karOrani;
        return <div key={koop.id} className="card" style={{marginBottom:12,borderColor:koop.durum==='Aktif'?'rgba(63,185,80,.3)':koop.durum==='Bekliyor'?'rgba(227,179,65,.3)':'var(--border)'}}>
          <div className="card-head" style={{borderBottom:'1px solid var(--border)'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span>🏗</span>
              <div>
                <div style={{color:'var(--text)',fontWeight:800,fontSize:13}}>{koop.ad}</div>
                <div style={{color:'var(--muted)',fontSize:10,fontWeight:600}}>{koop.olusturan} · {koop.olusturmaTarih}</div>
              </div>
            </div>
            <span className={`badge ${durumBadge(koop.durum)}`}>{koop.durum}</span>
          </div>
          <div style={{padding:'12px 16px'}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:8,marginBottom:12}}>
              <div style={{background:'var(--surface2)',border:'1px solid var(--border)',padding:'8px 12px'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:1,marginBottom:4}}>YATIRIM</div>
                <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:800,color:'var(--gold)',fontSize:14}}>{KOOP_FMT(koop.fiyat)}</div>
              </div>
              <div style={{background:'var(--surface2)',border:'1px solid var(--border)',padding:'8px 12px'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:1,marginBottom:4}}>KAR ORANI</div>
                <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:800,color:'var(--green)',fontSize:14}}>%{karOrani}</div>
              </div>
              <div style={{background:'var(--surface2)',border:'1px solid var(--border)',padding:'8px 12px'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:1,marginBottom:4}}>KİŞİ BAŞI KAR</div>
                <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:800,color:'var(--blue)',fontSize:14}}>{FMT(kisiKar)}</div>
              </div>
              <div style={{background:'var(--surface2)',border:'1px solid var(--border)',padding:'8px 12px'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:1,marginBottom:4}}>SÜRE</div>
                <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:800,color:'var(--blue)',fontSize:14}}>{koop.gun} Gün</div>
              </div>
              <div style={{background:'rgba(139,92,246,.06)',border:'1px solid rgba(139,92,246,.25)',padding:'8px 12px'}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:1,marginBottom:4}}>KASAYA (KİŞİ×%20)</div>
                <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:800,color:'var(--purple)',fontSize:12}}>{FMT(kisiPay)}<span style={{fontSize:9,opacity:.7}}>×4={FMT(toplamPay)}</span></div>
              </div>
            </div>

            {/* Üyeler */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:1,marginBottom:6}}>ÜYE DURUMU ({doluluk}/4)</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
                {[0,1,2,3].map(i=>{
                  const ad=koop.uyeler[i];
                  return <div key={i} style={{flex:'1 1 80px',minWidth:80,padding:'8px 10px',background:ad?'rgba(63,185,80,.08)':'var(--surface2)',border:`1px solid ${ad?'rgba(63,185,80,.3)':'var(--border)'}`,textAlign:'center'}}>
                    {ad?<>
                      <div style={{fontSize:18,marginBottom:2}}>👤</div>
                      <div style={{fontSize:11,fontWeight:700,color:'var(--text)'}}>{ad}</div>
                      <span style={{fontSize:9,color:'var(--green)',fontWeight:700}}>✓ Aktif</span>
                    </>:<>
                      <div style={{fontSize:18,marginBottom:2,opacity:.3}}>👤</div>
                      <div style={{fontSize:10,color:'var(--muted)',fontStyle:'italic'}}>Boş Slot</div>
                    </>}
                  </div>;
                })}
              </div>
              {!dolmu&&isAdmin&&<button className="btn btn-blue" style={{marginBottom:8}} onClick={()=>setUyeEkleModal(koop.id)}>+ Üye Ekle</button>}
            </div>

            {/* Sayaçlar */}
            <div style={{background:'var(--surface2)',border:'1px solid var(--border)',padding:'10px 14px',marginBottom:10}}>
              {koop.durum==='Bekliyor'&&!dolmu&&<div>
                <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,marginBottom:4}}>4 KİŞİ DOLMAZSA SAYAÇ</div>
                <KoopTimer targetTs={koop.sayacBitis}/>
                {sayacBitti&&<div style={{fontSize:11,color:'var(--red)',fontWeight:700,marginTop:4}}>⚠ Sayaç doldu — kooperatif başlayamadı!</div>}
              </div>}
              {koop.durum==='Aktif'&&koop.bitisTs&&<div>
                <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,marginBottom:4}}>KOOPERATİF KALAN SÜRE</div>
                <KoopTimer targetTs={koop.bitisTs}/>
                {suremiBitti&&<div style={{fontSize:11,color:'var(--gold)',fontWeight:700,marginTop:4}}>✅ Süre doldu! Tamamlayabilirsiniz.</div>}
              </div>}
              {koop.durum==='Bekliyor'&&dolmu&&<div style={{fontSize:12,color:'var(--green)',fontWeight:700}}>✓ 4 üye tamamlandı! Süre başladı.</div>}
            </div>

            {isAdmin&&<div className="btn-row">
              {koop.durum==='Aktif'&&<button className="btn btn-green" onClick={()=>koopTamamla(koop)}>✅ Tamamla & Kasaya Aktar</button>}
              {(koop.durum==='Bekliyor'||koop.durum==='Aktif')&&<button className="btn btn-red" onClick={()=>koopIptal(koop)}>İptal Et</button>}
            </div>}
          </div>
        </div>;
      })}
    </>}

    {/* GEÇMİŞ KOOPLAR */}
    {subTab==='gecmis'&&<>
      {gecmisKooplar.length===0&&<div className="empty">Henüz tamamlanan veya iptal edilen kooperatif yok.</div>}
      {gecmisKooplar.map(koop=>{
        const k=hesaplaKar(koop.fiyat,koop.gun);
        return <div key={koop.id} className="card" style={{marginBottom:8,padding:'12px 16px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
            <div style={{fontWeight:700,color:'var(--text)',fontSize:13}}>{koop.ad}</div>
            <span className={`badge ${durumBadge(koop.durum)}`}>{koop.durum}</span>
          </div>
          <div style={{display:'flex',gap:12,fontSize:11,color:'var(--dim)',fontWeight:600,flexWrap:'wrap'}}>
            <span>💰 {KOOP_FMT(koop.fiyat)}</span>
            <span>📈 %{koop.karOrani||k.karOrani} kar</span>
            <span>👤 Kişi Başı: {FMT(koop.kisiBasiKar||k.kisiBasiKar)}</span>
            <span>👥 {koop.uyeler.length}/4</span>
            <span>📅 {koop.gun} gün</span>
            {koop.kasayaAktarilan&&<span style={{color:'var(--purple)'}}>🏦 +{FMT(koop.kasayaAktarilan)} kasaya</span>}
          </div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:4}}>{koop.durum==='Tamamlandı'?koop.tamamlanmaTarih:koop.iptalTarih}</div>
        </div>;
      })}
    </>}

    {/* GÜNLÜK GÖNDERİM TAKİBİ */}
    {subTab==='gunluk'&&<>
      <div style={{background:'rgba(88,166,255,.06)',border:'1px solid rgba(88,166,255,.2)',padding:'12px 16px',marginBottom:14,fontSize:12,color:'var(--text)',fontWeight:600}}>
        📤 Bugün ({bugun}) üyelerin kooperatif gönderimleri. Yöneticiler kimin gönderip göndermediğini görebilir ve işaretleyebilir.
      </div>
      {kooperatifler.filter(k=>k.durum==='Aktif').length===0&&<div className="empty">Aktif kooperatif yok. Gönderim takibi için önce aktif bir kooperatif gerekli.</div>}
      {kooperatifler.filter(k=>k.durum==='Aktif').map(koop=>{
        const gonderimler=gonderilenler(koop.id);
        return <div key={koop.id} className="card" style={{marginBottom:14}}>
          <div className="card-head">
            <span>🏗 {koop.ad} — Günlük Üye Gönderimi</span>
            <span className="badge b-green">Aktif</span>
          </div>
          {koop.uyeler.length===0&&<div className="empty">Bu kooperatifte üye yok.</div>}
          {koop.uyeler.map(ad=>{
            const gonderildi=!!gonderimler[ad];
            return <div key={ad} style={{padding:'10px 16px',borderBottom:'1px solid rgba(48,54,61,.5)',display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:28,height:28,borderRadius:'50%',background:gonderildi?'rgba(63,185,80,.15)':'rgba(139,148,158,.1)',border:`1.5px solid ${gonderildi?'var(--green)':'var(--border)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0,color:gonderildi?'var(--green)':'var(--muted)'}}>
                {gonderildi?'✓':'?'}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{ad}</div>
                <div style={{fontSize:10,fontWeight:700,color:gonderildi?'var(--green)':'var(--red)'}}>
                  {gonderildi?'✅ GÖNDERİLDİ':'❌ GÖNDERİLMEDİ'}
                </div>
              </div>
              {!gonderildi&&isAdmin&&<button className="pay-btn" style={{background:'rgba(63,185,80,.1)',border:'1px solid rgba(63,185,80,.3)',color:'var(--green)',padding:'5px 10px',fontSize:9,cursor:'pointer'}} onClick={()=>gonderimIsaretle(koop.id,ad)}>✓ Gönderildi İşaretle</button>}
              {gonderildi&&<span style={{fontSize:10,color:'var(--green)',fontWeight:700,background:'rgba(63,185,80,.1)',border:'1px solid rgba(63,185,80,.25)',padding:'4px 8px'}}>✓ Tamamlandı</span>}
            </div>;
          })}
        </div>;
      })}
    </>}

    {/* ÜCRET LİSTESİ */}
    {subTab==='ucret'&&<>
      <div style={{background:'rgba(139,92,246,.06)',border:'1px solid rgba(139,92,246,.25)',padding:'12px 16px',marginBottom:14,fontSize:12,color:'var(--text)',fontWeight:600,lineHeight:1.7}}>
        💳 Her üyenin aktif/tamamlanan kooplardan biriken parti kasası payı (Kişi Başı Kar × %20).<br/>
        <span style={{color:'var(--muted)',fontWeight:500}}>Koop bitince üyenin borcu buraya eklenir. Ödeme yapılınca sıfırlanır.</span>
      </div>
      {(()=>{
        const liste=ucretListesi();
        const adlar=Object.keys(liste);
        if(adlar.length===0)return <div className="empty">Henüz kooperatif üyesi yok.</div>;
        return adlar.map(ad=>{
          const borc=uyeUcretler[ad]||0;
          const koopSayisi=liste[ad].length;
          return <div key={ad} className="card" style={{marginBottom:10,padding:'12px 16px',borderColor:borc>0?'rgba(139,92,246,.3)':'var(--border)'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:'rgba(139,92,246,.1)',border:'1.5px solid rgba(139,92,246,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>👤</div>
              <div style={{flex:1,minWidth:120}}>
                <div style={{fontWeight:800,fontSize:13,color:'var(--text)'}}>{ad}</div>
                <div style={{fontSize:10,color:'var(--muted)',fontWeight:600}}>{koopSayisi} kooperatife katıldı</div>
                <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>{liste[ad].map(k=>k.ad).join(' · ')}</div>
              </div>
              <div style={{textAlign:'right',minWidth:120}}>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:700,letterSpacing:1,marginBottom:2}}>TOPLAM BORÇ</div>
                <div style={{fontFamily:"'Oswald',sans-serif",fontWeight:900,fontSize:16,color:borc>0?'var(--purple)':'var(--green)'}}>{FMT(borc)} TL</div>
                <div style={{fontSize:9,color:borc>0?'var(--red)':'var(--green)',fontWeight:700}}>{borc>0?'⚠ ÖDENMEDİ':'✓ ÖDEME YOK'}</div>
              </div>
              {borc>0&&isAdmin&&<button className="btn btn-green" style={{fontSize:10,padding:'6px 12px'}} onClick={()=>ucretOde(ad)}>✅ Ödendi — Sıfırla</button>}
            </div>
          </div>;
        });
      })()}
    </>}

    {/* ÜYE EKLE MODAL */}
    {uyeEkleModal&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&setUyeEkleModal(null)}>
      <div className="modal">
        <div className="modal-head"><h2>Üye Ekle</h2><button className="modal-close" onClick={()=>setUyeEkleModal(null)}>✕</button></div>
        <div className="modal-body">
          {(()=>{
            const koop=kooperatifler.find(k=>k.id===uyeEkleModal);
            if(!koop)return null;
            const mevcutlar=koop.uyeler;
            const eklenebilir=tumUyeAdlari.filter(ad=>!mevcutlar.includes(ad));
            return <>
              <div style={{marginBottom:12,fontSize:12,color:'var(--muted)'}}>Kooperatife katılacak üyeyi seçin. Şu an {mevcutlar.length}/4 üye mevcut.</div>
              <div className="field" style={{marginBottom:16}}>
                <label>Üye Seç</label>
                <select value={secilenUye} onChange={e=>setSecilenUye(e.target.value)}>
                  <option value="">-- Üye Seçin --</option>
                  {eklenebilir.map(ad=><option key={ad} value={ad}>{ad}</option>)}
                </select>
              </div>
              <div className="btn-row">
                <button className="btn btn-green" onClick={()=>uyeEkle(uyeEkleModal,secilenUye)}>Ekle</button>
                <button className="btn btn-gray" onClick={()=>setUyeEkleModal(null)}>İptal</button>
              </div>
            </>;
          })()}
        </div>
      </div>
    </div>}
  </>;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
