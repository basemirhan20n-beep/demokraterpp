<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useCallback,useEffect,useMemo}=React;
const FMT=n=>new Intl.NumberFormat('tr-TR',{style:'currency',currency:'TRY',minimumFractionDigits:0}).format(+n||0);
const NOW=()=>new Date().toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
const TODAY=()=>new Date().toISOString().slice(0,10);
const AYID=()=>new Date().toISOString().slice(0,7);
const TXN=()=>'T'+Date.now().toString(36).toUpperCase();
const genP2A=()=>{const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='DP-';for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r;};
const ini=s=>s.trim().split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
const GOREVLER=['Milletvekili','Parti Üyesi','Meclis Başkanı','Parti Yöneticisi','Parti Başkanı','İstihbarat Başkanı','General','Medya Başkanı'];
const BTIP=['Kasaya Yardım','Yeni Üye Yardımı','Kampanya Katkısı','Aidat'];
const GTIP=['Aylık Ücret Ödemesi','Kampanya Gideri','Temsil Gideri','Operasyon Gideri','Diğer'];
const ROL_IZİNLER={
  admin:['panel','uyeler','egitim','talepler','hazine','transferler','grafikler','takvim','sohbet','raporlar','yonetim','import','log','takip','sema','kooperatif'],
  ekon:['panel','uyeler','egitim','talepler','transferler','takvim','sohbet','takip','sema','kooperatif'],
  uye:['panel','egitim','talepler','takvim','sohbet','takip','sema','kooperatif'],
};
const KOOP_FIYATLAR=[100000000,200000000,300000000,500000000,800000000,1300000000,2100000000,3400000000];
const KOOP_FMT=n=>{if(n>=1000000000)return(n/1000000000).toLocaleString('tr-TR',{maximumFractionDigits:1})+' Milyar';if(n>=1000000)return(n/1000000).toLocaleString('tr-TR',{maximumFractionDigits:0})+' Milyon';return n.toLocaleString('tr-TR');};
const EDU_KATS=['Liderlik','Ekonomi','Hukuk','İletişim','Strateji','Güvenlik'];

function lsG(k,d){try{const v=localStorage.getItem('dperp2_'+k);return v!=null?JSON.parse(v):d;}catch{return d;}}
function lsS(k,v){try{localStorage.setItem('dperp2_'+k,JSON.stringify(v));}catch{}}
function usePersist(k,d){
  const [v,set]=useState(()=>lsG(k,d));
  const setV=useCallback(fn=>{set(p=>{const n=typeof fn==='function'?fn(p):fn;lsS(k,n);return n;});},[k]);
  return [v,setV];
}
function calcTimer(ts){
  if(!ts)return{label:'Bekleniyor',cls:'none'};
  const diff=Date.now()-ts,h24=86400000;
  if(diff>=h24)return{label:'⚠ GECİKTİ',cls:'late'};
  const rem=h24-diff,h=Math.floor(rem/3600000),m=Math.floor((rem%3600000)/60000),s=Math.floor((rem%60000)/1000);
  return{label:`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`,cls:rem<14400000?'warn':'ok'};
}
function TimerDisp({ts}){
  const [t,setT]=useState(()=>calcTimer(ts));
  useEffect(()=>{const iv=setInterval(()=>setT(calcTimer(ts)),1000);return()=>clearInterval(iv)},[ts]);
  return <span className={`pay-timer ${t.cls}`}>{t.label}</span>;
}
function AcInput({value,onChange,items,placeholder}){
  const [open,setOpen]=useState(false);const [sel,setSel]=useState(-1);
  const sug=value.length>=2?items.filter(i=>i.toLowerCase().includes(value.toLowerCase())).slice(0,8):[];
  const pick=v=>{onChange(v);setOpen(false);setSel(-1)};
  const onKey=e=>{
    if(!open||!sug.length)return;
    if(e.key==='ArrowDown'){e.preventDefault();setSel(p=>Math.min(p+1,sug.length-1))}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(p=>Math.max(p-1,-1))}
    else if(e.key==='Enter'&&sel>=0){e.preventDefault();pick(sug[sel])}
    else if(e.key==='Escape')setOpen(false);
  };
  return <div className="ac-wrap">
    <input value={value} onChange={e=>{onChange(e.target.value);setOpen(true);setSel(-1)}} onFocus={()=>value.length>=2&&setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),150)} onKeyDown={onKey} placeholder={placeholder||''}/>
    {open&&sug.length>0&&<div className="ac-list">{sug.map((s,i)=><div key={i} className={`ac-item${sel===i?' sel':''}`} onMouseDown={()=>pick(s)}><span>{s}</span></div>)}</div>}
  </div>;
}
function Avatar({ad,size=36,photos,onClick,online,style={}}){
  const foto=photos&&photos[ad];
  return <div style={{width:size,height:size,borderRadius:'50%',background:'rgba(88,166,255,.12)',border:'1px solid rgba(88,166,255,.25)',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Oswald', sans-serif",fontWeight:800,fontSize:size*0.36,color:'var(--blue)',flexShrink:0,position:'relative',cursor:onClick?'pointer':'default',...style}} onClick={onClick}>
    {foto?<img src={foto} alt={ad} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:ini(ad)}
    {online!==undefined&&<span className="online-dot2" style={{background:online?'var(--green)':'var(--muted)'}}/>}
  </div>;
}
function AvatarUpload({ad,photos,setPhotos,size=40}){
  const ref=useRef();
  const foto=photos&&photos[ad];
  const onFile=e=>{
    const f=e.target.files[0];if(!f)return;
    if(f.size>600000){alert('Max 600KB');return;}
    const r=new FileReader();r.onload=ev=>setPhotos(p=>({...p,[ad]:ev.target.result}));r.readAsDataURL(f);
  };
  return <div className="av-wrap" style={{width:size,height:size}} onClick={()=>ref.current.click()}>
    <input ref={ref} className="av-input" type="file" accept="image/*" onChange={onFile}/>
    <div className="av" style={{background:'rgba(88,166,255,.12)',border:'1px solid rgba(88,166,255,.25)',color:'var(--blue)',fontSize:size*0.36}}>
      {foto?<img src={foto} alt={ad}/>:ini(ad)}
    </div>
    <div className="av-overlay">📷</div>
  </div>;
}

// ═══════════════ APP ═══════════════
function App(){
  const [user,setUser]=useState(()=>lsG('session',null));
  const [page,setPage]=useState('panel');
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [showNotif,setShowNotif]=useState(false);
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);

  const [members,setMembers]=usePersist('members',[]);
  const [txs,setTxs]=usePersist('txs',[]);
  const [transfers,setTransfers]=usePersist('transfers',[]);
  const [ekonList,setEkonList]=usePersist('ekonList',[]);
  const [payTimes,setPayTimes]=usePersist('payTimes',{});
  const [baskancash]=usePersist('baskancash',81400000);
  const [gunlukLmt,setGunlukLmt]=usePersist('glmt',{date:'',g:0,c:0});
  const [aylikOdeme,setAylikOdeme]=usePersist('aylikOdeme',{donem:'',odendi:{}});
  const [egitimler,setEgitimler]=usePersist('egitimler',[]);
  const [kayitlar,setKayitlar]=usePersist('kayitlar',{});
  const [talepler,setTalepler]=usePersist('talepler',[]);
  const [tickets,setTickets]=usePersist('tickets',[]);
  const [notifler,setNotifler]=usePersist('notifler',[]);
  const [okunanlar,setOkunanlar]=usePersist('okunanlar',[]);
  const [chatMsgs,setChatMsgs]=usePersist('chatMsgs',[]);
  const [onlineList,setOnlineList]=usePersist('onlineList',{});
  const [chatOkundu,setChatOkundu]=usePersist('chatOkundu',{});
  const [typingList,setTypingList]=usePersist('typingList',{});
  const [photos,setPhotos]=usePersist('photos',{});
  const [events,setEvents]=usePersist('events',[]); // takvim etkinlikleri
  const [uyeNotlar,setUyeNotlar]=usePersist('uyeNotlar',{}); // {uyeId:[{not,tarih}]}
  const [terfiler,setTerfiler]=usePersist('terfiler',{}); // {uyeId:[{eskiGorev,yeniGorev,tarih}]}
  const [loginLog,setLoginLog]=usePersist('loginLog',[]);
  const [duyurular,setDuyurular]=usePersist('duyurular',[]);
  const [gorevler,setGorevler]=usePersist('gorevler',[]);
  const [gorevTamamla,setGorevTamamla]=usePersist('gorevTamamla',{});
  const [bgold,setBgold]=usePersist('bgold',{}); // [{user,tarih,ip}]
  const [dogumlar,setDogumlar]=usePersist('dogumlar',{}); // {uyeId:'YYYY-MM-DD'}
  const [pinStore,setPinStore]=usePersist('pinStore',{}); // {userName:pin}
  const [roller,setRoller]=usePersist('roller',{});
  const [yoklamalar,setYoklamalar]=usePersist('yoklamalar',[]);
  const [aidatlar,setAidatlar]=usePersist('aidatlar',[]);
  const [anketler,setAnketler]=usePersist('anketler',[]); // {userName:'admin'|'ekon'|'uye'}
  const [yonetimSemasi,setYonetimSemasi]=usePersist('yonetimSemasi',{baskan:'',sekreter:'',yoneticiler:['','','','',''],egitimBaskani:'',ekonomiBaskani:'',mediaSorumlusu:''});
  const [kooperatifler,setKooperatifler]=usePersist('kooperatifler',[]);
  const [koopGunlukGonderim,setKoopGunlukGonderim]=usePersist('koopGunlukGonderim',{});
  const [uyeUcretler,setUyeUcretler]=usePersist('uyeUcretler',{});

  const showT=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),3200)};
  const addNotif=(title,msg)=>{
    const n={id:TXN(),title,msg,tarih:NOW(),ts:Date.now()};
    setNotifler(p=>[n,...p.slice(0,49)]);
  };

  const bugun=TODAY(),buAy=AYID();
  const gunluk=gunlukLmt.date===bugun?gunlukLmt:{date:bugun,g:0,c:0};
  const MAX_G=2000000,MAX_C=5000000;
  const gelir=txs.filter(t=>t.tip==='GELİR').reduce((s,t)=>s+t.tutar,0)+baskancash;
  const gider=txs.filter(t=>t.tip==='GİDER').reduce((s,t)=>s+t.tutar,0);
  const bakiye=gelir-gider;
  const aktif=members.filter(m=>m.durum==='Aktif').length;
  const okunmayan=notifler.filter(n=>!okunanlar.includes(n.id)).length;
  const bekleyen=talepler.filter(t=>t.durum==='Bekliyor').length;

  useEffect(()=>{if(aylikOdeme.donem!==buAy)setAylikOdeme({donem:buAy,odendi:{}});},[buAy]);

  // Online heartbeat
  useEffect(()=>{
    if(!user)return;
    const beat=()=>setOnlineList(p=>({...p,[user.ad]:Date.now()}));
    beat();const iv=setInterval(beat,15000);return()=>clearInterval(iv);
  },[user?.ad]);

  // Chat polling
  useEffect(()=>{
    const iv=setInterval(()=>{
      try{const r=localStorage.getItem('dperp2_chatMsgs');if(r)setChatMsgs(()=>JSON.parse(r));}catch{}
      try{const r=localStorage.getItem('dperp2_typingList');if(r)setTypingList(()=>JSON.parse(r));}catch{}
    },2500);return()=>clearInterval(iv);
  },[]);

  // Doğum günü kontrolü
  useEffect(()=>{
    if(!user)return;
    const bugunMD=bugun.slice(5);
    Object.entries(dogumlar).forEach(([uid,dob])=>{
      if(dob&&dob.slice(5)===bugunMD){
        const m=members.find(m=>m.id===uid);
        if(m)addNotif('🎂 Doğum Günü',`Bugün ${m.ad}'ın doğum günü!`);
      }
    });
  },[bugun]);

  const isOnline=ad=>onlineList[ad]&&Date.now()-onlineList[ad]<30000;

  // Aktivite skoru hesapla
  const calcScore=m=>{
    let s=0;
    const odemeGecmisi=txs.filter(t=>t.alici===m.ad&&t.tur==='Aylık Ücret Ödemesi').length;
    const egitimSayisi=Object.values(kayitlar).filter(list=>list.includes(m.id||m.ad)).length;
    const transferSayisi=transfers.filter(t=>t.from===m.ad||t.to===m.ad).length;
    s+=Math.min(odemeGecmisi*10,40);
    s+=Math.min(egitimSayisi*15,30);
    s+=Math.min(transferSayisi*5,20);
    if(m.durum==='Aktif')s+=10;
    return Math.min(s,100);
  };

  const handleLogin=(ad,sifre,pin)=>{
    // Admin girişi
    if(ad==='admin'&&sifre==='admin'){
      const u={ad:'Admin',tip:'admin',id:'admin'};
      lsS('session',u);setUser(u);
      setLoginLog(p=>[{user:'Admin',tarih:NOW(),eylem:'Giriş'},...p.slice(0,99)]);
      return;
    }
    // Excel üyesi: isim + P2A kodu ile giriş
    const excelUye=members.find(m=>m.kaynak==='excel'&&m.p2aKod&&m.ad.toLowerCase().trim()===ad.toLowerCase().trim()&&m.p2aKod===sifre.toUpperCase().trim());
    if(excelUye){
      const u={id:excelUye.id,ad:excelUye.ad,tip:'uye',rol:excelUye.gorev,p2aKod:excelUye.p2aKod};
      lsS('session',u);setUser(u);
      setLoginLog(p=>[{user:excelUye.ad,tarih:NOW(),eylem:'Giriş (P2A)'},...p.slice(0,99)]);
      return;
    }
    // Ekon girişi (şifre ile)
    const e=ekonList.find(e=>e.ad.toLowerCase()===ad.toLowerCase()&&e.sifre===sifre);
    if(e){
      const userPin=pinStore[e.ad];
      if(userPin&&pin!==userPin){showT('PIN hatalı.','err');return;}
      const rol=roller[e.ad]||'ekon';
      const u={...e,tip:rol};lsS('session',u);setUser(u);
      setLoginLog(p=>[{user:e.ad,tarih:NOW(),eylem:'Giriş'},...p.slice(0,99)]);
      return;
    }
    showT('Ad veya şifre / P2A kodu hatalı.','err');
  };
  const handleKayit=(ad,sifre)=>{
    if(!ad||!sifre){showT('Ad ve şifre zorunlu.','err');return;}
    if(ad.toLowerCase()==='admin'){showT('Bu isim kullanılamaz.','err');return;}
    if(ekonList.some(e=>e.ad.toLowerCase()===ad.toLowerCase())){showT('Bu isim zaten kayıtlı.','err');return;}
    const yeni={id:TXN(),ad,sifre,rol:'Ekonomi Sorumlusu',kayitTarih:NOW()};
    setEkonList(p=>[...p,yeni]);
    const rol=roller[ad]||'ekon';
    const u={...yeni,tip:rol};lsS('session',u);setUser(u);
    setLoginLog(p=>[{user:ad,tarih:NOW(),eylem:'Kayıt & Giriş'},...p.slice(0,99)]);
  };
  const logout=()=>{
    if(user)setLoginLog(p=>[{user:user.ad,tarih:NOW(),eylem:'Çıkış'},...p.slice(0,99)]);
    lsS('session',null);setUser(null);setPage('panel');setSidebarOpen(false);
  };

  const izin=p=>{const r=user?.tip||'uye';return(ROL_IZİNLER[r]||ROL_IZİNLER.uye).includes(p);};

  // Excel import
  const ALAN={ad:['ad','ad soyad','isim','name'],gorev:['görev','gorev','pozisyon','unvan'],maas:['maaş','maas','aylikucret','salary'],durum:['durum','status'],dogum:['doğum','dogum','birthdate','dob']};
  const nH=h=>(h||'').toString().toLowerCase().replace(/[^a-zğışöüç0-9]/g,'');
  const findCol=(hs,cs)=>{const n=hs.map(nH);for(const c of cs){const cn=nH(c);const i=n.findIndex(h=>h===cn||h.includes(cn)||cn.includes(h));if(i!==-1)return i;}return -1;};
  const fileRef=useRef();const [drag,setDrag]=useState(false);
  const handleFile=useCallback(file=>{
    if(!file)return;
    const ext=file.name.split('.').pop().toLowerCase();
    if(!['xlsx','xls','csv'].includes(ext)){showT('xlsx/xls/csv gerekli.','err');return;}
    const r=new FileReader();
    r.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        if(rows.length<2){showT('Dosya boş.','err');return;}
        const hs=rows[0].map(h=>h.toString());
        const cols={};for(const[k,v]of Object.entries(ALAN))cols[k]=findCol(hs,v);
        if(cols.ad===-1){showT('Ad sütunu bulunamadı.','err');return;}
        const yeni=[];const newDogumlar={};
        for(let i=1;i<rows.length;i++){
          const row=rows[i];const ad=(row[cols.ad]||'').toString().trim();
          if(!ad||members.some(m=>m.ad.toLowerCase()===ad.toLowerCase()))continue;
          const id=TXN();
          yeni.push({id,ad,gorev:cols.gorev!==-1&&row[cols.gorev]?row[cols.gorev].toString():'Parti Üyesi',aylikUcret:cols.maas!==-1?+row[cols.maas]||0:0,durum:cols.durum!==-1&&(row[cols.durum]||'').toString().toLowerCase().includes('askı')?'Askıda':'Aktif',kayitTarih:NOW(),kaynak:'excel',p2aKod:genP2A()});
          if(cols.dogum!==-1&&row[cols.dogum])newDogumlar[id]=row[cols.dogum].toString().trim();
        }
        if(!yeni.length){showT('Yeni üye bulunamadı.');return;}
        setMembers(p=>[...p,...yeni]);
        if(Object.keys(newDogumlar).length)setDogumlar(p=>({...p,...newDogumlar}));
        showT(`✓ ${yeni.length} üye eklendi.`);
      }catch(err){showT('Hata: '+err.message,'err')}
    };
    r.readAsArrayBuffer(file);
  },[members]);

  // Kasa
  const bagisKaydet=(bForm,setBF)=>{
    const t=+bForm.tutar;
    if(!bForm.gonderen||!t){showT('Bağışçı ve tutar gerekli.','err');return;}
    if(gunluk.g+t>MAX_G){showT(`Günlük giriş limiti ${FMT(MAX_G)}. Kalan: ${FMT(MAX_G-gunluk.g)}`,'warn');return;}
    setTxs(p=>[{id:TXN(),tip:'GELİR',aciklama:bForm.aciklama||bForm.tur,gonderen:bForm.gonderen,tutar:t,tur:bForm.tur,tarih:NOW()},...p]);
    setGunlukLmt({date:bugun,g:gunluk.g+t,c:gunluk.c});
    setBF({gonderen:'',tutar:'',tur:'Kasaya Yardım',aciklama:''});showT('✓ Kasaya eklendi.');
  };
  const odemeYap=(oForm,setOF)=>{
    const t=+oForm.tutar;
    if(!oForm.alici||!t){showT('Alıcı ve tutar gerekli.','err');return;}
    if(t>bakiye){showT('Yetersiz bakiye!','err');return;}
    if(gunluk.c+t>MAX_C){showT(`Günlük çıkış limiti ${FMT(MAX_C)}. Kalan: ${FMT(MAX_C-gunluk.c)}`,'warn');return;}
    setTxs(p=>[{id:TXN(),tip:'GİDER',aciklama:oForm.aciklama||oForm.tur,alici:oForm.alici,tutar:t,tur:oForm.tur,tarih:NOW()},...p]);
    setGunlukLmt({date:bugun,g:gunluk.g,c:gunluk.c+t});
    const m=members.find(m=>m.ad.toLowerCase()===oForm.alici.toLowerCase());
    if(m)setPayTimes(p=>({...p,[m.id]:Date.now()}));
    setOF({alici:'',tutar:'',tur:'Aylık Ücret Ödemesi',aciklama:''});showT('✓ Ödeme yapıldı.');
  };
  const hizliOde=m=>{
    const ucret=+m.aylikUcret||0;
    if(!ucret){showT('Aylık ücret tanımlı değil.','err');return;}
    if(ucret>bakiye){showT('Yetersiz bakiye!','err');return;}
    if(gunluk.c+ucret>MAX_C){showT('Günlük çıkış limiti aşılıyor.','warn');return;}
    setTxs(p=>[{id:TXN(),tip:'GİDER',aciklama:'Aylık Ücret — '+m.ad,alici:m.ad,tutar:ucret,tur:'Aylık Ücret Ödemesi',tarih:NOW()},...p]);
    setPayTimes(p=>({...p,[m.id]:Date.now()}));
    setGunlukLmt({date:bugun,g:gunluk.g,c:gunluk.c+ucret});
    setAylikOdeme(p=>({...p,odendi:{...p.odendi,[m.id]:true}}));
    showT(`✓ ${m.ad} — ${FMT(ucret)} ödendi.`);
  };
  const topluOde=(secili,aktifler)=>{
    const hedef=aktifler.filter(m=>secili.has(m.id)&&+m.aylikUcret>0);
    const toplam=hedef.reduce((s,m)=>s+(+m.aylikUcret||0),0);
    if(toplam>bakiye){showT('Yetersiz bakiye!','err');return false;}
    if(gunluk.c+toplam>MAX_C){showT('Günlük limit aşılıyor.','warn');return false;}
    const now=Date.now();
    setTxs(p=>[...hedef.map(m=>({id:TXN(),tip:'GİDER',aciklama:'Toplu Ücret — '+m.ad,alici:m.ad,tutar:+m.aylikUcret,tur:'Aylık Ücret Ödemesi',tarih:NOW()})),...p]);
    setPayTimes(p=>{const n={...p};hedef.forEach(m=>n[m.id]=now);return n;});
    setGunlukLmt({date:bugun,g:gunluk.g,c:gunluk.c+toplam});
    setAylikOdeme(p=>{const n={...p.odendi};hedef.forEach(m=>n[m.id]=true);return{...p,odendi:n};});
    showT(`✓ ${hedef.length} kişiye ${FMT(toplam)} ödendi.`);
    return true;
  };

  if(!user)return <LoginScreen onLogin={handleLogin} onKayit={handleKayit} toast={toast} showT={showT}/>;

  const PAGES=[
    {id:'panel',icon:'📊',label:'Panel',section:'ana'},
    {id:'uyeler',icon:'👥',label:'Üyeler',section:'ana'},
    {id:'takvim',icon:'📅',label:'Takvim & Etkinlik',section:'ana'},
    {id:'sohbet',icon:'💬',label:'Sohbet',section:'ana'},
    {id:'egitim',icon:'🎓',label:'Eğitim & Rehber',section:'bilgi'},
    {id:'talepler',icon:'📨',label:'Talepler',section:'bilgi',badge:izin('talepler')&&bekleyen>0?bekleyen:0},
    {id:'hazine',icon:'💰',label:'Hazine',section:'finans'},
    {id:'transferler',icon:'🔄',label:'Transferler',section:'finans'},
    {id:'grafikler',icon:'📈',label:'Grafikler',section:'finans'},
    {id:'raporlar',icon:'📄',label:'Raporlar',section:'finans'},
    {id:'sesli',icon:'🎙',label:'Sesli Sohbet',section:'ana'},
    {id:'kooperatif',icon:'🏗',label:'Kooperatif',section:'finans'},
    {id:'duyurular',icon:'📣',label:'Duyurular',section:'bilgi'},
    {id:'gorevler',icon:'✅',label:'Görev Takibi',section:'bilgi'},
    {id:'takip',icon:'📋',label:'Takip Merkezi',section:'bilgi'},
    {id:'oyunlar',icon:'🎮',label:'🎮 Oyunlar',section:'oyun'},
    {id:'yonetim',icon:'⚙',label:'Yönetim',section:'sistem'},
    {id:'sema',icon:'🏛',label:'Yönetim Şeması',section:'sistem'},
    {id:'log',icon:'🔐',label:'Giriş Logları',section:'sistem'},
    {id:'import',icon:'📥',label:'Excel Import',section:'sistem'},
  ].filter(p=>izin(p.id));

  const sections=[...new Set(PAGES.map(p=>p.section))];
  const sectionLabel={ana:'Ana Menü',bilgi:'Hizmetler',finans:'Finans',sistem:'Sistem',oyun:'🎮 Oyunlar'};

  const props={duyurular,setDuyurular,gorevler,setGorevler,gorevTamamla,setGorevTamamla,page,setPage,members,setMembers,txs,setTxs,transfers,setTransfers,ekonList,setEkonList,payTimes,setPayTimes,aylikOdeme,setAylikOdeme,egitimler,setEgitimler,kayitlar,setKayitlar,talepler,setTalepler,tickets,setTickets,notifler,setNotifler,events,setEvents,uyeNotlar,setUyeNotlar,terfiler,setTerfiler,loginLog,dogumlar,setDogumlar,pinStore,setPinStore,roller,setRoller,photos,setPhotos,chatMsgs,setChatMsgs,onlineList,typingList,setTypingList,chatOkundu,setChatOkundu,bakiye,gelir,gider,aktif,gunluk,MAX_G,MAX_C,bugun,buAy,user,isOnline,calcScore,showT,addNotif,hizliOde,topluOde,bagisKaydet,odemeYap,setModal,setGunlukLmt,drag,setDrag,fileRef,handleFile,bgold,setBgold,yoklamalar,setYoklamalar,aidatlar,setAidatlar,anketler,setAnketler,yonetimSemasi,setYonetimSemasi,kooperatifler,setKooperatifler,koopGunlukGonderim,setKoopGunlukGonderim,uyeUcretler,setUyeUcretler,dragHandler:{onDragOver:e=>{e.preventDefault();setDrag(true)},onDragLeave:()=>setDrag(false),onDrop:e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0])}}};

  return <div className="app">
    <div className="topbar">
      <button className="hamburger" onClick={()=>setSidebarOpen(p=>!p)}><span/><span/><span/></button>
      <div className="tb-logo">⚖ <span>Demokrat</span> Parti · ERP</div>
      <div className="tb-right">
        <button className="notif-btn" onClick={()=>{setShowNotif(p=>!p);if(!showNotif)setOkunanlar(notifler.map(n=>n.id))}}>
          🔔{okunmayan>0&&<span className="notif-dot"/>}
        </button>
        <div className="user-menu" onClick={logout}>
          <Avatar ad={user.ad} size={26} photos={photos}/>
          <div><div className="user-menu-name">{user.ad}</div><div className="user-menu-role">{user.tip==='admin'?'Yönetici':user.rol||'Üye'} · Çıkış ↩</div></div>
        </div>
      </div>
      {showNotif&&<div className="notif-dropdown">
        <div className="notif-head">Bildirimler ({notifler.length})</div>
        {notifler.length===0?<div className="empty" style={{padding:16}}>Bildirim yok</div>:notifler.slice(0,20).map(n=>(
          <div key={n.id} className={`notif-item${!okunanlar.includes(n.id)?' unread':''}`}>
            <div className="notif-txt"><div className="notif-title">{n.title}</div><div className="notif-sub">{n.msg}</div></div>
            <div className="notif-time">{n.tarih}</div>
          </div>
        ))}
      </div>}
    </div>
    <div className="app-body">
      <div className={`sidebar${sidebarOpen?' open':''}`}>
        <div className="sb-scroll">
          {sections.map(sec=>{
            const secPages=PAGES.filter(p=>p.section===sec);
            if(!secPages.length)return null;
            return <div key={sec}>
              <div className="sb-section">{sectionLabel[sec]}</div>
              {secPages.map(p=>(
                <div key={p.id} className={`sb-item${page===p.id?' active':''}`} onClick={()=>{setPage(p.id);setSidebarOpen(false)}}>
                  <span className="sb-icon">{p.icon}</span>
                  <span>{p.label}</span>
                  {p.badge>0&&<span className="sb-badge">{p.badge}</span>}
                </div>
              ))}
            </div>;
          })}
        </div>
        <div className="sb-bottom">
          <div className="online-pill"><span className="online-dot"/>{Object.keys(onlineList).filter(ad=>isOnline(ad)).length} çevrimiçi</div>
        </div>
      </div>
      <div className={`sb-overlay${sidebarOpen?' show':''}`} onClick={()=>setSidebarOpen(false)}/>
      <div className="main-content">
        <div className="page">
          {page==='panel'&&<PanelPage {...props}/>}
          {page==='uyeler'&&<UyelerPage {...props}/>}
          {page==='takvim'&&<TakvimPage {...props}/>}
          {page==='sohbet'&&<SohbetPage {...props}/>}
          {page==='sesli'&&<SesliSohbetPage {...props}/>}
          {page==='duyurular'&&<DuyurularPage {...props}/>}
          {page==='gorevler'&&<GorevlerPage {...props}/>}
          {page==='egitim'&&<EgitimPage {...props}/>}
          {page==='talepler'&&<TaleplerPage {...props}/>}
          {page==='hazine'&&izin('hazine')&&<HazinePage {...props}/>}
          {page==='transferler'&&izin('transferler')&&<TransferlerPage {...props}/>}
          {page==='grafikler'&&<GrafiklerPage {...props}/>}
          {page==='raporlar'&&izin('raporlar')&&<RaporlarPage {...props}/>}
          {page==='yonetim'&&izin('yonetim')&&<YonetimPage {...props}/>}
          {page==='log'&&izin('log')&&<LogPage {...props}/>}
          {page==='import'&&izin('import')&&<ImportPage {...props}/>}
          {page==='oyunlar'&&<OyunlarPage {...props}/>}
          {page==='takip'&&<TakipPage {...props}/>}
          {page==='sema'&&<YonetimSemasiPage {...props}/>}
          {page==='kooperatif'&&<KooperatifPage {...props}/>}
        </div>
      </div>
    </div>
    {modal&&<ProfileModal modal={modal} setModal={setModal} {...props}/>}
    {toast&&<div className={`toast${toast.type==='err'?' err':toast.type==='warn'?' warn':''}`}>{toast.msg}</div>}
  </div>;
}

// ════ LOGIN ════
function LoginScreen({onLogin,onKayit,toast,showT}){
  const [mod,setMod]=useState('giris');
  const [ad,setAd]=useState('');const [sifre,setSifre]=useState('');const [pin,setPin]=useState('');
  const go=()=>mod==='giris'?onLogin(ad,sifre,pin):onKayit(ad,sifre);
  return <div className="login-wrap">
    <div className="login-card">
      <div className="login-top">
        <div className="login-emblem">⚖</div>
        <div className="login-title">DEMOKRAT PARTİ</div>
        <div className="login-sub">ERP · YÖNETİM PLATFORMU</div>
      </div>
      <div className="login-tabs">
        {[['giris','Giriş Yap'],['kayit','Kayıt Ol']].map(([k,v])=>(
          <button key={k} className={`login-tab${mod===k?' active':''}`} onClick={()=>{setMod(k);setAd('');setSifre('');setPin('')}}>{v}</button>
        ))}
      </div>
      <div className="login-body">
        <div className="lf"><label>Ad Soyad</label><input value={ad} onChange={e=>setAd(e.target.value)} placeholder={mod==='giris'?'Adınızı girin':'Ad Soyad'} onKeyDown={e=>e.key==='Enter'&&go()}/></div>
        <div className="lf"><label>{mod==='giris'?'Şifre / P2A Kodu':'Şifre'}</label><input value={sifre} onChange={e=>setSifre(e.target.value)} placeholder={mod==='giris'?'Şifre veya DP-XXXXXX':'••••••'} onKeyDown={e=>e.key==='Enter'&&go()}/></div>
        {mod==='giris'&&<div style={{fontSize:10,color:'var(--muted)',marginBottom:8,padding:'6px 10px',background:'var(--surface2)',border:'1px solid var(--border)',lineHeight:1.5}}>💡 Excel ile eklenen üyeler: <b style={{color:'var(--gold)'}}>Ad Soyad</b> ve <b style={{color:'var(--gold)'}}>P2A Kodunu</b> girin. Yönetici panelinden kodunuzu öğrenin.</div>}
        {mod==='giris'&&<div className="lf"><label>2FA PIN (varsa)</label><input type="password" value={pin} onChange={e=>setPin(e.target.value)} placeholder="6 haneli PIN (opsiyonel)" maxLength={6} onKeyDown={e=>e.key==='Enter'&&go()}/></div>}
        <button className="login-btn" onClick={go}>{mod==='giris'?'Giriş Yap':'Hesap Oluştur'}</button>
        {toast&&toast.type==='err'&&<div className="login-err">{toast.msg}</div>}
      </div>
    </div>
  </div>;
}

// ════ PANEL ════
function PanelPage({gelir,gider,bakiye,aktif,members,txs,gunluk,MAX_G,MAX_C,payTimes,hizliOde,user,aylikOdeme,egitimler,kayitlar,talepler,events,bugun,setModal,photos,addNotif}){
  const aktifler=members.filter(m=>m.durum==='Aktif');
  const gec=aktifler.filter(m=>{const t=payTimes[m.id];return t&&Date.now()-t>=86400000}).length;
  const toplamUcret=aktifler.reduce((s,m)=>s+(+m.aylikUcret||0),0);
  const odenmisSay=Object.keys(aylikOdeme.odendi||{}).length;
  const isAdmin=user.tip==='admin';
  const bugunEvents=events.filter(e=>e.tarih===bugun);
  return <>
    <div className="page-title"><span className="pt-icon">📊</span>Genel Panel</div>
    <div className="kpi-grid">
      <div className="kpi g"><div className="kpi-label">Toplam Gelir</div><div className="kpi-val g">{FMT(gelir)}</div><div className="kpi-sub">Başkancash dahil</div></div>
      <div className="kpi r"><div className="kpi-label">Toplam Gider</div><div className="kpi-val r">{FMT(gider)}</div></div>
      <div className="kpi gold"><div className="kpi-label">Net Bakiye</div><div className="kpi-val gold">{FMT(bakiye)}</div></div>
      <div className="kpi b"><div className="kpi-label">Aktif Üye</div><div className="kpi-val b">{aktif}</div><div className="kpi-sub">{gec>0?`${gec} gecikmiş`:aktif>0?'Güncel':'—'}</div></div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:10,marginBottom:18}}>
      <div className="kpi p"><div className="kpi-label">Aylık Yük</div><div className="kpi-val p" style={{fontSize:16}}>{FMT(toplamUcret)}</div><div className="kpi-sub">{odenmisSay}/{aktif} ödendi</div></div>
      <div className="kpi gold"><div className="kpi-label">Bekleyen Talep</div><div className="kpi-val gold" style={{fontSize:16}}>{talepler.filter(t=>t.durum==='Bekliyor').length}</div></div>
      <div className="kpi b"><div className="kpi-label">Bugün Etkinlik</div><div className="kpi-val b" style={{fontSize:16}}>{bugunEvents.length}</div></div>
      <div className="kpi g"><div className="kpi-label">Eğitim</div><div className="kpi-val g" style={{fontSize:16}}>{egitimler.length}</div></div>
    </div>
    <div className="card" style={{marginBottom:14}}>
      <div className="card-head">Günlük Limit Durumu</div>
      <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        {[['Günlük Giriş',gunluk.g,MAX_G,'var(--green)'],['Günlük Çıkış',gunluk.c,MAX_C,'var(--red)']].map(([l,u,mx,col])=>{
          const pct=Math.min(100,u/mx*100);
          return <div key={l} className="lmt-bar">
            <div className="lmt-bar-row"><span style={{color:'var(--muted)'}}>{l}</span><span style={{color:pct>=80?'var(--red)':col,fontFamily:"'Oswald', sans-serif"}}>{FMT(u)} / {FMT(mx)}</span></div>
            <div className="lmt-track"><div className="lmt-fill" style={{width:pct+'%',background:pct>=100?'var(--red)':pct>=80?'var(--gold)':col}}/></div>
          </div>;
        })}
      </div>
    </div>
    {isAdmin&&toplamUcret>0&&<div className="card" style={{marginBottom:14}}>
      <div className="card-head">Aylık Ücret — {aylikOdeme.donem}</div>
      <div style={{padding:'12px 14px',display:'flex',flexWrap:'wrap',gap:6}}>
        {aktifler.filter(m=>+m.aylikUcret>0).map(m=>{
          const odendi=!!(aylikOdeme.odendi||{})[m.id];
          return <div key={m.id} onClick={()=>!odendi&&hizliOde(m)} style={{display:'flex',alignItems:'center',gap:6,background:'var(--surface2)',border:`1px solid ${odendi?'rgba(63,185,80,.4)':'var(--border)'}`,padding:'6px 10px',cursor:odendi?'default':'pointer',transition:'.15s'}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:odendi?'var(--green)':'var(--muted)',display:'block',flexShrink:0}}/>
            <span style={{fontSize:12,fontWeight:700,color:odendi?'var(--green)':'var(--text)'}}>{m.ad}</span>
            <span style={{fontSize:10,color:'var(--muted)',fontFamily:"'Oswald', sans-serif"}}>{FMT(+m.aylikUcret)}</span>
            {!odendi&&<span style={{fontSize:9,color:'var(--blue)',fontWeight:700}}>Öde →</span>}
          </div>;
        })}
      </div>
    </div>}
    {isAdmin&&aktifler.length>0&&<div className="card" style={{marginBottom:14}}>
      <div className="card-head">Ödeme Sayacı</div>
      <div className="pay-list" style={{padding:'8px 0'}}>
        {aktifler.slice(0,6).map(m=>{
          const isLate=payTimes[m.id]&&Date.now()-payTimes[m.id]>=86400000;
          return <div key={m.id} className={`pay-row${isLate?' late':''}`}>
            <div className="pay-info" onClick={()=>setModal({type:'member',data:m})}>
              <Avatar ad={m.ad} size={30} photos={photos}/>
              <div style={{minWidth:0}}><div className="pay-name">{m.ad}</div><div className="pay-sub">{m.gorev} · {FMT(+m.aylikUcret||0)}/ay</div></div>
            </div>
            <TimerDisp ts={payTimes[m.id]}/>
            <button className="pay-btn" onClick={()=>hizliOde(m)}>Öde</button>
          </div>;
        })}
      </div>
    </div>}
    {txs.length>0&&<div className="card">
      <div className="card-head">Son Hareketler</div>
      <div className="tbl-wrap"><table><thead><tr><th>Tip</th><th>Açıklama</th><th>Tutar</th><th>Tarih</th></tr></thead>
      <tbody>{txs.slice(0,5).map(t=><tr key={t.id}>
        <td><span className={`badge ${t.tip==='GELİR'?'b-green':'b-red'}`}>{t.tip}</span></td>
        <td className="nm">{t.aciklama}</td>
        <td className={t.tip==='GELİR'?'pos':'neg'}>{t.tip==='GELİR'?'+':'-'}{FMT(t.tutar)}</td>
        <td style={{fontSize:10}}>{t.tarih}</td>
      </tr>)}</tbody></table></div>
    </div>}
  </>;
}

// ════ ÜYELER ════
function UyelerPage({members,setMembers,setModal,payTimes,hizliOde,bakiye,topluOde,user,photos,setPhotos,calcScore,showT,terfiler,setTerfiler,uyeNotlar,setUyeNotlar,dogumlar}){
  const [ara,setAra]=useState('');
  const [kaynak,setKaynak]=useState('tumu');
  const [secili,setSecili]=useState(new Set());
  const [konfirm,setKonfirm]=useState(false);
  const [sonuc,setSonuc]=useState(null);
  const isAdmin=user.tip==='admin';
  const filtered=members.filter(m=>{
    const araMatch=!ara||m.ad.toLowerCase().includes(ara.toLowerCase())||m.gorev.toLowerCase().includes(ara.toLowerCase());
    const kaynakMatch=kaynak==='tumu'||(kaynak==='excel'&&m.kaynak==='excel')||(kaynak==='manuel'&&(m.kaynak==='manuel'||!m.kaynak));
    return araMatch&&kaynakMatch;
  });
  const aktifler=filtered.filter(m=>m.durum==='Aktif');
  const toggle=id=>setSecili(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  const tumSec=()=>setSecili(secili.size===aktifler.length&&aktifler.every(m=>secili.has(m.id))?new Set():new Set(aktifler.map(m=>m.id)));
  const araChange=v=>{setAra(v);setSecili(new Set());};
  const kaynakChange=v=>{setKaynak(v);setSecili(new Set());};
  return <>
    <div className="page-title"><span className="pt-icon">👥</span>Üyeler</div>
    <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
      <div style={{flex:1,minWidth:160,position:'relative'}}>
        <input value={ara} onChange={e=>araChange(e.target.value)} placeholder="🔍 Oyuncu veya görev ara..."
          style={{width:'100%',background:'var(--card)',border:'1px solid var(--border)',color:'var(--text)',padding:'9px 12px',font:"600 13px 'Oswald', sans-serif",outline:'none',transition:'.15s'}}
          onFocus={e=>e.target.style.borderColor='var(--green)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
        {ara&&<span onClick={()=>araChange('')} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',color:'var(--muted)',cursor:'pointer',fontSize:16}}>✕</span>}
      </div>
      {isAdmin&&aktifler.length>0&&<button className="btn btn-blue" onClick={tumSec}>{secili.size===aktifler.length?'Seçimi Kaldır':'Tümünü Seç'}</button>}
      {isAdmin&&secili.size>0&&<button className="btn btn-green" onClick={()=>{setKonfirm(true);setSonuc(null)}}>Toplu Ödeme ({secili.size})</button>}
    </div>
    <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
      {[['tumu',`Tümü (${members.length})`],['excel',`Excel (${members.filter(m=>m.kaynak==='excel').length})`],['manuel',`Manuel (${members.filter(m=>m.kaynak==='manuel'||!m.kaynak).length})`]].map(([k,v])=>(
        <button key={k} onClick={()=>kaynakChange(k)} style={{padding:'4px 12px',font:"700 10px 'Oswald', sans-serif",background:kaynak===k?'var(--green)':'var(--card)',color:kaynak===k?'#fff':'var(--muted)',border:`1px solid ${kaynak===k?'var(--green)':'var(--border)'}`,cursor:'pointer',transition:'.15s'}}>{v}</button>
      ))}
    </div>
    {members.length===0?<div className="empty">Üye yok. Excel Import veya Yönetim sekmesini kullanın.</div>:filtered.length===0?<div className="empty">"{ara}" bulunamadı.</div>:(
      <div className="mem-grid">
        {filtered.map(m=>{
          const t=calcTimer(payTimes[m.id]);const isSel=secili.has(m.id);
          const score=calcScore(m);
          const scoreColor=score>=70?'var(--green)':score>=40?'var(--gold)':'var(--red)';
          return <div key={m.id} className="mem-card" style={{borderColor:isSel?'var(--green)':''}} onClick={e=>{if(e.target.closest('.mem-check'))return;setModal({type:'member',data:m})}}>
            {isAdmin&&m.durum==='Aktif'&&<div className={`mem-check${isSel?' on':''}`} onClick={e=>{e.stopPropagation();toggle(m.id)}}>{isSel?'✓':''}</div>}
            <div style={{marginLeft:isAdmin&&m.durum==='Aktif'?'22px':'0'}}>
              <Avatar ad={m.ad} size={38} photos={photos} style={{marginBottom:8}}/>
            </div>
            <div className="mem-name">{m.ad}</div>
            <div className="mem-role">{m.gorev}</div>
            <div className="mem-salary">{FMT(+m.aylikUcret||0)}/ay</div>
            <div className={`mem-timer ${t.cls}`}>⏱ {t.label}</div>
            <div style={{marginTop:6}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:9,fontWeight:700,color:'var(--muted)',marginBottom:2}}>Aktivite <span style={{color:scoreColor}}>{score}/100</span></div>
              <div className="score-bar"><div className="score-fill" style={{width:score+'%',background:scoreColor}}/></div>
            </div>
            <div className="mem-top-right">
              <span className={`badge ${m.durum==='Aktif'?'b-green':'b-red'}`}>{m.durum}</span>
              <span className={`badge ${m.kaynak==='excel'?'b-blue':'b-gray'}`} style={{fontSize:8}}>{m.kaynak==='excel'?'Excel':'Manuel'}</span>
              {m.p2aKod&&isAdmin&&<span className="badge b-gold" style={{fontSize:8,fontFamily:"'Oswald',sans-serif",letterSpacing:1}}>{m.p2aKod}</span>}
            </div>
          </div>;
        })}
      </div>
    )}
    {konfirm&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&setKonfirm(false)}>
      <div className="modal">
        <div className="modal-head"><h2>Toplu Ödeme Onayı</h2><button className="modal-close" onClick={()=>setKonfirm(false)}>✕</button></div>
        <div className="modal-body">
          {sonuc?<div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:36,marginBottom:12}}>{sonuc.ok?'✅':'❌'}</div>
            <div style={{fontSize:14,fontWeight:700,color:sonuc.ok?'var(--green)':'var(--red)'}}>{sonuc.msg}</div>
            <button className="btn btn-blue" style={{marginTop:16}} onClick={()=>setKonfirm(false)}>Kapat</button>
          </div>:<>
            {aktifler.filter(m=>secili.has(m.id)).map(m=>(
              <div key={m.id} className="info-row"><span className="info-label">{m.ad}</span><span className="info-val" style={{color:'var(--green)',fontFamily:"'Oswald', sans-serif"}}>{FMT(+m.aylikUcret||0)}</span></div>
            ))}
            <div className="info-row"><span style={{fontWeight:700,color:'var(--text)'}}>Toplam</span><span style={{color:'var(--gold)',fontWeight:800,fontFamily:"'Oswald', sans-serif"}}>{FMT(aktifler.filter(m=>secili.has(m.id)).reduce((s,m)=>s+(+m.aylikUcret||0),0))}</span></div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>Bakiye: <span style={{color:'var(--gold)',fontFamily:"'Oswald', sans-serif"}}>{FMT(bakiye)}</span></div>
            <div className="btn-row" style={{marginTop:14}}>
              <button className="btn btn-green" onClick={()=>{const ok=topluOde(secili,aktifler);setSonuc({ok,msg:ok?`✓ ${secili.size} kişiye ödeme yapıldı.`:'İşlem başarısız.'});setSecili(new Set());}}>Onayla</button>
              <button className="btn btn-red" onClick={()=>setKonfirm(false)}>İptal</button>
            </div>
          </>}
        </div>
      </div>
    </div>}
  </>;
}

// ════ TAKVİM ════
function TakvimPage({events,setEvents,members,showT,user}){
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const [selectedDay,setSelectedDay]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [eForm,setEF]=useState({baslik:'',tur:'toplanti',aciklama:'',tarih:''});
  const isAdmin=user.tip==='admin';
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const prevMonthDays=new Date(year,month,0).getDate();
  const aylar=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const gunler=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  const startOffset=(firstDay===0?6:firstDay-1);
  const cells=[];
  for(let i=0;i<startOffset;i++)cells.push({day:prevMonthDays-startOffset+i+1,curr:false});
  for(let i=1;i<=daysInMonth;i++)cells.push({day:i,curr:true});
  while(cells.length%7!==0)cells.push({day:cells.length-startOffset-daysInMonth+1,curr:false});
  const getDateStr=d=>`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const dayEvents=d=>events.filter(e=>e.tarih===getDateStr(d));
  const todayStr=today.toISOString().slice(0,10);
  const etkinlikEkle=()=>{
    if(!eForm.baslik||!eForm.tarih){showT('Başlık ve tarih zorunlu.','err');return;}
    setEvents(p=>[...p,{id:TXN(),...eForm,olusturan:user.ad,olusturmaTarih:NOW()}]);
    setEF({baslik:'',tur:'toplanti',aciklama:'',tarih:''});setShowForm(false);showT('✓ Etkinlik eklendi.');
  };
  const selectedEvs=selectedDay?dayEvents(selectedDay):[];
  return <>
    <div className="page-title"><span className="pt-icon">📅</span>Takvim & Etkinlikler</div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,gap:10}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <button className="btn btn-gray" onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}}>←</button>
        <div style={{fontFamily:"'Oswald', sans-serif",fontWeight:800,fontSize:16,color:'var(--text)',minWidth:140,textAlign:'center'}}>{aylar[month]} {year}</div>
        <button className="btn btn-gray" onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}}>→</button>
      </div>
      {isAdmin&&<button className="btn btn-green" onClick={()=>{setEF(p=>({...p,tarih:selectedDay?getDateStr(selectedDay):todayStr}));setShowForm(true)}}>+ Etkinlik</button>}
    </div>
    <div className="cal-grid" style={{marginBottom:selectedDay?14:0}}>
      {gunler.map(g=><div key={g} className="cal-day-header">{g}</div>)}
      {cells.map((cell,i)=>{
        const dateStr=cell.curr?getDateStr(cell.day):'';
        const evs=cell.curr?dayEvents(cell.day):[];
        const isToday=dateStr===todayStr;
        const isSel=cell.curr&&selectedDay===cell.day;
        return <div key={i} className={`cal-day${isToday?' today':''}${!cell.curr?' other-month':''}${isSel?' today':''}`}
          style={{borderColor:isSel?'var(--blue)':''}}
          onClick={()=>cell.curr&&setSelectedDay(selectedDay===cell.day?null:cell.day)}>
          <div className="cal-day-num">{cell.day}</div>
          {evs.slice(0,2).map(e=><div key={e.id} className={`cal-event ${e.tur}`}>{e.baslik}</div>)}
          {evs.length>2&&<div style={{fontSize:9,color:'var(--muted)',fontWeight:700}}>+{evs.length-2}</div>}
        </div>;
      })}
    </div>
    {selectedDay&&selectedEvs.length>0&&<div className="card" style={{marginBottom:14}}>
      <div className="card-head">{String(selectedDay).padStart(2,'0')} {aylar[month]} — Etkinlikler</div>
      {selectedEvs.map(e=><div key={e.id} style={{padding:'10px 14px',borderBottom:'1px solid rgba(48,54,61,.5)',display:'flex',gap:10,alignItems:'flex-start'}}>
        <span className={`badge ${e.tur==='toplanti'?'b-blue':e.tur==='etkinlik'?'b-green':e.tur==='dogum'?'b-gold':'b-purple'}`}>{e.tur}</span>
        <div><div style={{fontWeight:700,color:'var(--text)',fontSize:13}}>{e.baslik}</div>{e.aciklama&&<div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{e.aciklama}</div>}</div>
        <div style={{marginLeft:'auto',fontSize:10,color:'var(--muted)'}}>{e.olusturan}</div>
      </div>)}
    </div>}
    {showForm&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
      <div className="modal">
        <div className="modal-head"><h2>Etkinlik Ekle</h2><button className="modal-close" onClick={()=>setShowForm(false)}>✕</button></div>
        <div className="modal-body">
          <div className="fg">
            <div className="field full"><label>Başlık *</label><input value={eForm.baslik} onChange={e=>setEF(p=>({...p,baslik:e.target.value}))} placeholder="Etkinlik adı"/></div>
            <div className="field"><label>Tür</label><select value={eForm.tur} onChange={e=>setEF(p=>({...p,tur:e.target.value}))}><option value="toplanti">Toplantı</option><option value="etkinlik">Etkinlik</option><option value="dogum">Doğum Günü</option><option value="hatirlatici">Hatırlatıcı</option></select></div>
            <div className="field"><label>Tarih *</label><input type="date" value={eForm.tarih} onChange={e=>setEF(p=>({...p,tarih:e.target.value}))}/></div>
            <div className="field full"><label>Açıklama</label><textarea value={eForm.aciklama} onChange={e=>setEF(p=>({...p,aciklama:e.target.value}))} placeholder="Detaylar..."/></div>
          </div>
          <div className="btn-row"><button className="btn btn-green" onClick={etkinlikEkle}>Kaydet</button><button className="btn btn-gray" onClick={()=>setShowForm(false)}>İptal</button></div>
        </div>
      </div>
    </div>}
  </>;
}

// ════ SOHBET ════
function SohbetPage({user,members,ekonList,chatMsgs,setChatMsgs,onlineList,chatOkundu,setChatOkundu,typingList,setTypingList,photos,setPhotos,isOnline}){
  const [aktifOda,setAktifOda]=useState('genel');
  const [mesaj,setMesaj]=useState('');
  const endRef=useRef();const inputRef=useRef();const typingRef=useRef();
  const isTyping=ad=>typingList[ad]&&Date.now()-typingList[ad]<4000&&ad!==user.ad;
  const tumKullanicilar=[{ad:'Admin',tip:'admin'},...ekonList.map(e=>({ad:e.ad})),...members.map(m=>({ad:m.ad}))].filter(u=>u.ad!==user.ad);
  const genelMsgs=chatMsgs.filter(m=>!m.to);
  const ozelMsgs=k=>chatMsgs.filter(m=>(m.from===user.ad&&m.to===k)||(m.from===k&&m.to===user.ad));
  const aktifMsgs=aktifOda==='genel'?genelMsgs:ozelMsgs(aktifOda);
  const okunmamisSay=oda=>{const msgs=oda==='genel'?genelMsgs:ozelMsgs(oda);const ls=chatOkundu[oda]||0;return msgs.filter(m=>m.ts>ls&&m.from!==user.ad).length;};
  const yazanlar=aktifOda==='genel'?Object.keys(typingList||{}).filter(ad=>isTyping(ad)):[];
  useEffect(()=>{setTimeout(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),50);setChatOkundu(p=>({...p,[aktifOda]:Date.now()}));},[aktifOda,aktifMsgs.length]);
  const onMesajChange=e=>{
    setMesaj(e.target.value);
    setTypingList(p=>({...p,[user.ad]:Date.now()}));
    clearTimeout(typingRef.current);
    typingRef.current=setTimeout(()=>setTypingList(p=>{const n={...p};delete n[user.ad];return n;}),3000);
  };
  const gonder=()=>{
    if(!mesaj.trim())return;
    setChatMsgs(p=>[...p,{id:TXN(),from:user.ad,to:aktifOda==='genel'?null:aktifOda,metin:mesaj.trim(),tarih:NOW(),ts:Date.now()}]);
    setTypingList(p=>{const n={...p};delete n[user.ad];return n;});
    setMesaj('');inputRef.current?.focus();
  };
  const onKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();gonder();}};
  const ozelKisiler=[...new Set(chatMsgs.filter(m=>m.to).flatMap(m=>[m.from,m.to]).filter(a=>a!==user.ad))];
  const tumOdalar=[{id:'genel',ad:'# Genel',genel:true},...tumKullanicilar.sort((a,b)=>(isOnline(b.ad)?1:0)-(isOnline(a.ad)?1:0)).map(u=>({id:u.ad,ad:u.ad,genel:false,online:isOnline(u.ad)}))];
  const aktifObj=tumOdalar.find(o=>o.id===aktifOda);
  return <div className="chat-wrap" style={{height:'calc(100vh - 96px)',height:'calc(100dvh - 96px)'}}>
    <div className="chat-sidebar" style={{flexShrink:0}}>
      <div className="chat-sb-head">💬 Sohbet</div>
      <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}}>
        <AvatarUpload ad={user.ad} photos={photos} setPhotos={setPhotos} size={30}/>
        <div><div style={{fontSize:11,fontWeight:700,color:'var(--text)'}}>{user.ad}</div><div className="online-pill" style={{marginTop:1}}><span className="online-dot"/>Çevrimiçi</div></div>
      </div>
      <div style={{flex:1,overflowY:'auto'}}>
        {tumOdalar.map(oda=>{
          const unread=okunmamisSay(oda.id);
          const lastMsg=oda.genel?genelMsgs[genelMsgs.length-1]:ozelMsgs(oda.id).slice(-1)[0];
          const yaziyorMu=!oda.genel&&isTyping(oda.id);
          return <div key={oda.id} className={`chat-room${aktifOda===oda.id?' active':''}`} onClick={()=>setAktifOda(oda.id)}>
            {oda.genel?<div style={{width:30,height:30,borderRadius:'50%',background:'rgba(88,166,255,.12)',border:'1px solid rgba(88,166,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>🌐</div>
              :<Avatar ad={oda.ad} size={30} photos={photos} online={oda.online}/>}
            <div style={{flex:1,minWidth:0}}>
              <div className="chat-room-name">{oda.ad}</div>
              <div className="chat-room-sub">{yaziyorMu?<span style={{color:'var(--green)',fontStyle:'italic'}}>yazıyor...</span>:lastMsg?lastMsg.metin.slice(0,18)+(lastMsg.metin.length>18?'...':''):oda.genel?'Herkes görür':'Özel'}</div>
            </div>
            {unread>0&&<span className="chat-unread">{unread}</span>}
          </div>;
        })}
      </div>
      <div style={{padding:'8px 12px',borderTop:'1px solid var(--border)'}}>
        <div className="online-pill"><span className="online-dot"/>{Object.keys(onlineList).filter(ad=>Date.now()-onlineList[ad]<30000).length} çevrimiçi</div>
      </div>
    </div>
    <div className="chat-main">
      <div className="chat-main-head">
        {aktifObj&&<>{aktifObj.genel?<div style={{fontSize:18}}>🌐</div>:<Avatar ad={aktifObj.ad} size={32} photos={photos} online={aktifObj.online}/>}
        <div>
          <div style={{fontWeight:700,fontSize:13,color:'var(--text)'}}>{aktifObj.ad}</div>
          <div style={{fontSize:10,color:aktifObj.genel?'var(--muted)':aktifObj.online?'var(--green)':'var(--muted)'}}>{aktifObj.genel?`${genelMsgs.length} mesaj`:aktifObj.online?'● Çevrimiçi':'○ Çevrimdışı'}</div>
        </div></>}
      </div>
      <div className="chat-msgs">
        {aktifMsgs.length===0&&<div className="empty" style={{marginTop:40}}>İlk mesajı siz atın! 👋</div>}
        {aktifMsgs.map(m=>{
          const benim=m.from===user.ad;
          return (
            <div key={m.id} style={{display:'flex',alignItems:'flex-end',gap:7,flexDirection:benim?'row-reverse':'row'}}>
              <Avatar ad={m.from} size={26} photos={photos} style={benim?{background:'rgba(63,185,80,.1)',color:'var(--green)',border:'1px solid rgba(63,185,80,.2)'}:{}}/>
              <div style={{maxWidth:'72%'}}>
                {!benim&&aktifOda==='genel'&&<div style={{fontSize:10,color:'var(--muted)',fontWeight:700,marginBottom:3,paddingLeft:2}}>{m.from}</div>}
                <div style={{padding:'9px 13px',fontSize:13,fontWeight:500,lineHeight:1.6,background:benim?'rgba(35,134,54,.22)':'var(--surface2)',border:`1px solid ${benim?'rgba(35,134,54,.35)':'var(--border)'}`,borderBottomRightRadius:benim?0:6,borderBottomLeftRadius:benim?6:0}}>{m.metin}</div>
                <div style={{fontSize:9,color:'var(--muted)',fontWeight:600,marginTop:3,textAlign:benim?'right':'left'}}>{m.tarih}</div>
              </div>
            </div>
          );
        })}
        <div ref={endRef}/>
      </div>
      <div className="typing-bar">
        {yazanlar.length>0&&<><div className="tdots"><span/><span/><span/></div><span>{yazanlar.join(', ')} yazıyor...</span></>}
      </div>
      <div className="chat-input-wrap">
        <textarea ref={inputRef} className="chat-input" value={mesaj} onChange={onMesajChange} onKeyDown={onKey} placeholder="Enter ile gönder, Shift+Enter yeni satır" rows={1}/>
        <button className="chat-send" onClick={gonder}>Gönder</button>
      </div>
    </div>
  </div>;
}

          <div><div style={{fontWeight:800,fontSize:12,color:'var(--text)'}}>{aktifTkObj.konu}</div><div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>{aktifTkObj.from}</div></div>

        </div>
        <div style={{flex:1,overflowY:'auto',padding:'10px 12px',display:'flex',flexDirection:'column',gap:6}}>
          {aktifTkObj.mesajlar.map(m=>(
            <div key={m.id} style={{alignSelf:m.admin?'flex-start':'flex-end',maxWidth:'88%'}}>
              <div className={`ticket-bubble ${m.admin?'admin':'user'}`}>{m.metin}</div>

            </div>
          ))}
        </div>
        {aktifTkObj.durum!=='Kapalı'&&<div style={{padding:'10px 12px',borderTop:'1px solid var(--border)',flexShrink:0}}>
          <textarea value={cevap} onChange={e=>setCevap(e.target.value)} placeholder={isAdmin?'Cevabınızı yazın...':'Ek bilgi...'} style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--text)',padding:'7px 10px',font:"500 12px 'Oswald', sans-serif",outline:'none',resize:'none',minHeight:55,marginBottom:6}}/>
          <div className="btn-row">
            <button className="btn btn-green" style={{flex:1}} onClick={()=>cevapEkle(aktifTkObj.id)}>Gönder</button>
            {isAdmin&&<button className="btn btn-gray" onClick={()=>setTickets(p=>p.map(t=>t.id===aktifTkObj.id?{...t,durum:'Kapalı'}:t))}>Kapat</button>}
          </div>
        </div>}
      </div>}
    </div>}
  </>;
}

    const t={id:TXN(),from:user.ad,tutar:+form.tutar,aciklama:form.aciklama,oncelik:form.oncelik,durum:'Bekliyor',tarih:NOW()};

    setForm({tutar:'',aciklama:'',oncelik:'Normal'});showT('✓ Talebiniz iletildi.');
  };
  const onayla=id=>{
    const t=talepler.find(t=>t.id===id);if(!t)return;
    if(t.tutar>bakiye){showT('Yetersiz bakiye!','err');return;}
    if(gunluk.c+t.tutar>MAX_C){showT('Günlük çıkış limiti aşılıyor.','warn');return;}
    setTalepler(p=>p.map(x=>x.id===id?{...x,durum:'Onaylandı',onayTarih:NOW()}:x));
    setTxs(p=>[{id:TXN(),tip:'GİDER',aciklama:'Talep Onayı — '+t.from,alici:t.from,tutar:t.tutar,tur:'Talep Ödemesi',tarih:NOW()},...p]);
    setGunlukLmt({date:bugun,g:gunluk.g,c:gunluk.c+t.tutar});
    addNotif('✅ Talep Onaylandı',`${t.from}: ${FMT(t.tutar)}`);showT('✓ Talep onaylandı.');
  };
  const reddet=id=>{setTalepler(p=>p.map(x=>x.id===id?{...x,durum:'Reddedildi'}:x));showT('Talep reddedildi.','warn');};
  return <>

        <div className="field full"><label>Açıklama *</label><textarea value={form.aciklama} onChange={e=>setForm(p=>({...p,aciklama:e.target.value}))} placeholder="Para ne için gerekli?"/></div>
      </div>
      <div className="btn-row"><button className="btn btn-gold" onClick={gonder}>Talep Gönder</button></div>
    </div>}
    {isAdmin&&<>
      <div style={{fontFamily:"'Oswald', sans-serif",fontSize:11,fontWeight:800,color:'var(--dim)',marginBottom:10,letterSpacing:'1px',textTransform:'uppercase'}}>Bekleyen Talepler ({talepler.filter(t=>t.durum==='Bekliyor').length})</div>
      {talepler.filter(t=>t.durum==='Bekliyor').map(t=><div key={t.id} className="card" style={{padding:'12px 14px',marginBottom:8}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8,gap:8}}>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:'var(--text)'}}>{t.from}</div>
            <div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>{t.tarih}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{fontFamily:"'Oswald', sans-serif",fontWeight:800,fontSize:15,color:'var(--gold)'}}>{FMT(t.tutar)}</div>
            {t.oncelik!=='Normal'&&<span className={`badge ${t.oncelik==='Kritik'?'b-red':'b-gold'}`}>{t.oncelik}</span>}
          </div>
        </div>
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:10,lineHeight:1.5}}>{t.aciklama}</div>
        <div className="btn-row"><button className="btn btn-green" onClick={()=>onayla(t.id)}>Onayla & Öde</button><button className="btn btn-red" onClick={()=>reddet(t.id)}>Reddet</button></div>
      </div>)}
    </>}
    <div style={{fontFamily:"'Oswald', sans-serif",fontSize:11,fontWeight:800,color:'var(--dim)',marginBottom:10,marginTop:14,letterSpacing:'1px',textTransform:'uppercase'}}>{isAdmin?`Tüm Talepler (${talepler.length})`:`Taleplerim (${benimTalepler.length})`}</div>
    {(isAdmin?talepler:benimTalepler).length===0?<div className="empty">Talep yok.</div>:<div className="card"><div className="tbl-wrap"><table><thead><tr><th>Gönderen</th><th>Tutar</th><th>Durum</th><th>Açıklama</th><th>Tarih</th></tr></thead>
    <tbody>{(isAdmin?talepler:benimTalepler).map(t=><tr key={t.id}>
      <td className="nm">{t.from}</td><td className="gold">{FMT(t.tutar)}</td>
      <td><span className={`badge ${statusColor[t.durum]||'b-gray'}`}>{t.durum}</span></td>
      <td style={{maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.aciklama}</td>
      <td style={{fontSize:10}}>{t.tarih}</td>
    </tr>)}</tbody></table></div></div>}
  </>;
}

// ════ GRAFİKLER ════
function GrafiklerPage({txs,gelir,gider,bakiye,members,transfers}){
  const barRef=useRef(),pieRef=useRef(),lineRef=useRef(),tRef=useRef();
  const GL={},GD={};txs.forEach(t=>{if(t.tip==='GELİR')GL[t.tur]=(GL[t.tur]||0)+t.tutar;else GD[t.tur]=(GD[t.tur]||0)+t.tutar;});
  const bLab=[...new Set([...Object.keys(GL),...Object.keys(GD)])];
  const baseOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b949e',font:{size:10,weight:'600'}}}},scales:{x:{ticks:{color:'#7d8590',font:{size:9}},grid:{color:'rgba(48,54,61,.6)'}},y:{ticks:{color:'#7d8590',font:{size:9},callback:v=>v>=1e6?`${(v/1e6).toFixed(1)}M`:`${(v/1e3).toFixed(0)}K`},grid:{color:'rgba(48,54,61,.6)'}}}};
  useEffect(()=>{if(!barRef.current)return;const c=new Chart(barRef.current.getContext('2d'),{type:'bar',data:{labels:bLab.length?bLab:['Veri'],datasets:[{label:'Gelir',data:bLab.map(l=>GL[l]||0),backgroundColor:'rgba(63,185,80,.7)',borderColor:'rgba(63,185,80,1)',borderWidth:1},{label:'Gider',data:bLab.map(l=>GD[l]||0),backgroundColor:'rgba(248,81,73,.6)',borderColor:'rgba(248,81,73,1)',borderWidth:1}]},options:baseOpts});return()=>c.destroy();},[txs]);
  const pLab=Object.keys(GD);const pColors=['rgba(248,81,73,.8)','rgba(227,179,65,.8)','rgba(88,166,255,.8)','rgba(63,185,80,.7)','rgba(188,140,255,.7)','rgba(139,148,158,.7)'];
  useEffect(()=>{if(!pieRef.current)return;const c=new Chart(pieRef.current.getContext('2d'),{type:'doughnut',data:{labels:pLab.length?pLab:['Gider Yok'],datasets:[{data:pLab.length?pLab.map(l=>GD[l]):[1],backgroundColor:pLab.length?pColors:['rgba(48,54,61,.5)'],borderColor:'#1c2128',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#8b949e',font:{size:10,weight:'600'},boxWidth:12}}}}});return()=>c.destroy();},[txs]);
  const sorted=[...txs].reverse();let cum=0;const ld=sorted.map(t=>{cum+=t.tip==='GELİR'?t.tutar:-t.tutar;return cum;});
  useEffect(()=>{if(!lineRef.current)return;const c=new Chart(lineRef.current.getContext('2d'),{type:'line',data:{labels:sorted.length?sorted.map((t,i)=>t.tarih?t.tarih.split(' ')[0]:`#${i+1}`):['—'],datasets:[{label:'Bakiye',data:ld.length?ld:[0],borderColor:'rgba(88,166,255,1)',backgroundColor:'rgba(88,166,255,.08)',borderWidth:2.5,tension:.3,fill:true,pointRadius:2,pointBackgroundColor:'rgba(88,166,255,1)'}]},options:{...baseOpts,scales:{x:{...baseOpts.scales.x,ticks:{...baseOpts.scales.x.ticks,maxTicksLimit:8}},y:baseOpts.scales.y}}});return()=>c.destroy();},[txs]);
  const tMap={};transfers.forEach(t=>{tMap[t.from]=(tMap[t.from]||0)+t.tutar;});const tS=Object.entries(tMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  useEffect(()=>{if(!tRef.current)return;const c=new Chart(tRef.current.getContext('2d'),{type:'bar',data:{labels:tS.length?tS.map(([k])=>k):['Veri'],datasets:[{label:'Toplam Transfer',data:tS.length?tS.map(([,v])=>v):[0],backgroundColor:'rgba(188,140,255,.7)',borderColor:'rgba(188,140,255,1)',borderWidth:1}]},options:{indexAxis:'y',...baseOpts}});return()=>c.destroy();},[transfers]);
  const alerts=[];
  if(bakiye<0)alerts.push({icon:'🚨',msg:`Kasa açığı: ${FMT(Math.abs(bakiye))}`});
  else if(gelir>0&&bakiye<gelir*0.1)alerts.push({icon:'⚠️',msg:`Düşük bakiye — Gelirin %${((bakiye/gelir)*100).toFixed(0)}'i`});
  if(gelir>0&&gider/gelir>0.8)alerts.push({icon:'📉',msg:`Yüksek harcama: %${(gider/gelir*100).toFixed(0)}`});
  return <>
    <div className="page-title"><span className="pt-icon">📈</span>Grafikler & Analiz</div>
    {alerts.length>0&&<div style={{marginBottom:14}}>{alerts.map((a,i)=><div key={i} className="alert-box"><span style={{fontSize:18}}>{a.icon}</span><span className="alert-txt">{a.msg}</span></div>)}</div>}
    <div className="chart-grid-2">
      <div className="chart-card"><div className="chart-title">Gelir / Gider Türleri</div><div className="chart-wrap"><canvas ref={barRef}/></div></div>
      <div className="chart-card"><div className="chart-title">Gider Dağılımı</div><div className="chart-wrap"><canvas ref={pieRef}/></div></div>
    </div>
    <div className="chart-card" style={{marginBottom:12}}><div className="chart-title">Kümülatif Bakiye Seyri</div><div className="chart-wrap" style={{height:220}}><canvas ref={lineRef}/></div></div>
    {transfers.length>0&&<div className="chart-card"><div className="chart-title">En Çok Transfer Gönderenler</div><div className="chart-wrap" style={{height:Math.max(150,tS.length*40)}}><canvas ref={tRef}/></div></div>}
  </>;
}

// ════ RAPORLAR ════
function RaporlarPage({txs,members,transfers,egitimler,kayitlar,talepler,gelir,gider,bakiye,aylikOdeme,calcScore}){
  const toplamUcret=members.filter(m=>m.durum==='Aktif').reduce((s,m)=>s+(+m.aylikUcret||0),0);
  const odenmisSay=Object.keys(aylikOdeme.odendi||{}).length;
  const gelirTurler={};txs.filter(t=>t.tip==='GELİR').forEach(t=>gelirTurler[t.tur]=(gelirTurler[t.tur]||0)+t.tutar);
  const giderTurler={};txs.filter(t=>t.tip==='GİDER').forEach(t=>giderTurler[t.tur]=(giderTurler[t.tur]||0)+t.tutar);

  const topAktif=members.map(m=>({...m,skor:calcScore(m)})).sort((a,b)=>b.skor-a.skor).slice(0,5);

    const rows=[['DEMOKRAT PARTİ ERP RAPORU','','',''],['Tarih:',NOW(),'',''],['','','',''],

      ['','','',''],['GİDER DAĞILIMI','','',''],...Object.entries(giderTurler).map(([k,v])=>[k,FMT(v),'','']),
      ['','','',''],['AYLIK ÜCRET','','',''],['Toplam Yük',FMT(toplamUcret),'',''],['Ödenen',odenmisSay,'',''],
      ['','','',''],['ÜYELER','','',''],['Toplam',members.length,'',''],['Aktif',members.filter(m=>m.durum==='Aktif').length,'',''],
      ['','','',''],['EN AKTİF ÜYELER','','',''],...topAktif.map(m=>[m.ad,m.gorev,m.skor+'/100','']),
    ];
    const ws=XLSX.utils.aoa_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Rapor');
    XLSX.writeFile(wb,`DP_Rapor_${TODAY()}.xlsx`);

  return <>
    <div className="page-title" style={{justifyContent:'space-between'}}>
      <span style={{display:'flex',alignItems:'center',gap:10}}><span className="pt-icon">📄</span>Raporlar</span>

      <div className="kpi r"><div className="kpi-label">Gider</div><div className="kpi-val r">{FMT(gider)}</div></div>
      <div className="kpi gold"><div className="kpi-label">Net Bakiye</div><div className="kpi-val gold">{FMT(bakiye)}</div></div>
      <div className="kpi b"><div className="kpi-label">Aylık Yük</div><div className="kpi-val b" style={{fontSize:15}}>{FMT(toplamUcret)}</div></div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
      <div className="card"><div className="card-head">Gelir Dağılımı</div><div style={{padding:'12px 14px'}}>
        {Object.entries(gelirTurler).map(([k,v])=><div key={k} className="info-row"><span className="info-label">{k}</span><span className="info-val" style={{color:'var(--green)',fontFamily:"'Oswald', sans-serif"}}>{FMT(v)}</span></div>)}

        {Object.keys(giderTurler).length===0&&<div className="empty">Veri yok</div>}
      </div></div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <div className="card"><div className="card-head">En Aktif Üyeler</div><div style={{padding:'12px 14px'}}>
